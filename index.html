<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羽毛球AB对抗赛(通用智能排班版)</title>
    <style>
        :root {
            --primary: #1abc9c;
            --primary-dark: #16a085;
            --red: #e74c3c;
            --blue: #3498db;
            --bg: #f5f7f9;
            --card-bg: #ffffff;
            --text: #2c3e50;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            font-size: 14px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin: 15px 0 5px 0;
            color: #1a252f;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.1rem;
            margin: 20px 0 10px 0;
            padding-left: 8px;
            border-left: 4px solid var(--primary-dark);
            font-weight: bold;
        }

        /* 步骤1：配置表单样式 */
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal !important;
            cursor: pointer;
        }

        /* 步骤2：名字录入（自适应3行2排或动态多行2排） */
        .name-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px 15px;
            margin-bottom: 10px;
        }
        .name-item {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
        }
        .name-label-text {
            font-weight: bold;
            min-width: 30px;
            color: #7f8c8d;
        }
        .name-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
        }

        /* 按钮 */
        .btn-block {
            width: 100%;
            border: none;
            padding: 14px;
            font-size: 1rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            color: white;
            transition: background 0.2s;
        }
        .btn-orange { background-color: #e67e22; }
        .btn-orange:active { background-color: #d35400; }
        .btn-teal { background-color: var(--primary); }
        .btn-teal:active { background-color: var(--primary-dark); }

        /* 步骤3：赛程展现 */
        .round-container {
            margin-bottom: 15px;
            background: #eaeded;
            border-radius: 8px;
            padding: 4px;
        }
        .round-title {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 10px;
            color: #34495e;
        }
        .match-card {
            background: var(--card-bg);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .match-card:last-child { margin-bottom: 0; }
        .court-label {
            font-size: 0.75rem;
            background: #95a5a6;
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
            min-width: 40px;
            text-align: center;
        }
        .team-players {
            width: 33%;
            font-weight: 600;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .team-a { color: var(--red); text-align: right; }
        .team-b { color: var(--blue); text-align: left; }
        .score-area {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28%;
        }
        .score-num {
            width: 38px;
            height: 32px;
            font-size: 1.1rem;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-weight: bold;
        }
        .colon { font-weight: bold; color: #7f8c8d; margin: 0 4px; }

        /* 大榜样式 */
        .summary-total {
            background: #2c3e50;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }
        .rank-table th, .rank-table td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
        }
        .rank-table th { background: #f8f9fa; color: #7f8c8d; font-size: 0.8rem; }
        .winner-tag { color: #2ecc71; font-weight: bold; }
        .error-tips { color: var(--red); font-size: 0.85rem; margin-top: 5px; display: none;}
    </style>
</head>
<body>

<div class="container">
    <h1>羽毛球对抗赛智能管理系统</h1>

    <div id="step1" class="card">
        <div style="font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">第一步：赛事参数配置</div>
        
        <div class="form-group">
            <label>比赛类型</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="matchType" value="single"> 单打 (1vs1)</label>
                <label class="radio-label"><input type="radio" name="matchType" value="double" checked> 双打 (2vs2)</label>
            </div>
        </div>

        <div class="form-group">
            <label>可用场地数量 (个)</label>
            <input type="number" id="cfgCourts" class="form-control" value="2" min="1">
        </div>

        <div class="form-group">
            <label>预计比赛轮数 (轮)</label>
            <input type="number" id="cfgRounds" class="form-control" value="9" min="1">
        </div>

        <div class="form-group">
            <label>每组人员数量 (人/组)</label>
            <input type="number" id="cfgPlayers" class="form-control" value="6" min="2">
            <div id="errorTips" class="error-tips"></div>
        </div>

        <button type="button" class="btn-block btn-orange" onclick="goToStep2()">下一步：录入选手名单</button>
    </div>

    <div id="step2" class="card" style="display: none;">
        <div style="font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">第二步：录入两组选手姓名</div>
        
        <span style="color:var(--red); font-weight:bold; display:block; margin-bottom:8px;">🔴 A 组红方队员名单</span>
        <div class="name-grid" id="containerInputsA"></div>
        
        <span style="color:var(--blue); font-weight:bold; display:block; margin-top:15px; margin-bottom:8px;">🔵 B 组蓝方队员名单</span>
        <div class="name-grid" id="containerInputsB"></div>
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button type="button" class="btn-block btn-orange" style="width: 35%; background-color: #95a5a6;" onclick="backToStep1()">返回修改</button>
            <button type="button" class="btn-block btn-teal" style="width: 65%;" onclick="lockNamesAndBuildAll()">锁定名单并生成赛程</button>
        </div>
    </div>

    <div id="step3" style="display: none;">
        <div class="section-title">第三步：比分录入与实时战绩大榜</div>
        <div id="dynamicScheduleList"></div>

        <div class="section-title">第四步：实时大榜排名</div>
        <div class="summary-total" id="groupSummary"></div>

        <div style="font-weight: bold; color: var(--red); margin-bottom: 5px;">🔴 A 组内部战绩排名</div>
        <table class="rank-table">
            <thead>
                <tr>
                    <th style="width: 15%;">排名</th>
                    <th style="width: 30%;">队员</th>
                    <th style="width: 20%;">胜-负</th>
                    <th style="width: 18%;">净胜分</th>
                    <th style="width: 17%;">得分</th>
                </tr>
            </thead>
            <tbody id="rankA"></tbody>
        </table>

        <div style="font-weight: bold; color: var(--blue); margin-bottom: 5px;">🔵 B 组内部战绩排名</div>
        <table class="rank-table">
            <thead>
                <tr>
                    <th style="width: 15%;">排名</th>
                    <th style="width: 30%;">队员</th>
                    <th style="width: 20%;">胜-负</th>
                    <th style="width: 18%;">净胜分</th>
                    <th style="width: 17%;">得分</th>
                </tr>
            </thead>
            <tbody id="rankB"></tbody>
        </table>
        
        <button type="button" class="btn-block btn-orange" style="margin-top:10px; background-color: #e74c3c;" onclick="resetAllTournament()">清空比赛并重新开局</button>
    </div>
</div>

<script>
    // Global parameters configuration
    let isDouble = true;
    let numCourts = 2;
    let numRounds = 9;
    let playersPerGroup = 6;
    
    let nameMapA = {};
    let nameMapB = {};
    let generatedMatches = []; // Holds scheduled match metadata

    function backToStep1() {
        document.getElementById("step2").style.display = "none";
        document.getElementById("step1").style.display = "block";
    }

    function goToStep2() {
        isDouble = document.querySelector('input[name="matchType"]:checked').value === 'double';
        numCourts = parseInt(document.getElementById("cfgCourts").value) || 1;
        numRounds = parseInt(document.getElementById("cfgRounds").value) || 5;
        playersPerGroup = parseInt(document.getElementById("cfgPlayers").value) || 6;

        // Validation checking for legal setup
        const requiredPerRound = isDouble ? (numCourts * 2) : (numCourts * 1);
        const errorTips = document.getElementById("errorTips");
        
        if (playersPerGroup < requiredPerRound) {
            errorTips.innerText = `❌ 人数不足！${numCourts}个场地打${isDouble?'双':'单'}打，每轮每组至少需要 ${requiredPerRound} 人。`;
            errorTips.style.display = "block";
            return;
        }
        errorTips.style.display = "none";

        // Dynamic generation of 3-rows-2-columns style name inputs
        renderNameInputGrid("containerInputsA", "A", playersPerGroup);
        renderNameInputGrid("containerInputsB", "B", playersPerGroup);

        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
    }

    function renderNameInputGrid(containerId, groupLetter, count) {
        const container = document.getElementById(containerId);
        let html = "";
        const defaultNames = {
            "A": ["张三", "李四", "王五", "赵六", "钱七", "孙八", "周九", "吴十"],
            "B": ["阿华", "阿明", "阿强", "阿飞", "小丽", "小红", "小冬", "小宇"]
        };

        for (let i = 1; i <= count; i++) {
            let defaultVal = defaultNames[groupLetter][i-1] || (groupLetter + i);
            html += `
                <div class="name-item">
                    <span class="name-label-text">${groupLetter}${i}:</span>
                    <input type="text" id="inputName_${groupLetter}_${i}" class="name-input" value="${defaultVal}">
                </div>`;
        }
        container.innerHTML = html;
    }

    function lockNamesAndBuildAll() {
        // Build internal code to real name maps
        nameMapA = {};
        nameMapB = {};
        for (let i = 1; i <= playersPerGroup; i++) {
            nameMapA["A" + i] = document.getElementById(`inputName_A_${i}`).value.trim() || ("A" + i);
            nameMapB["B" + i] = document.getElementById(`inputName_B_${i}`).value.trim() || ("B" + i);
        }

        // Run schedule allocation scheduler algorithm
        let scheduleSuccess = autoScheduleEngine();
        if(!scheduleSuccess) return;

        // Render cards layout
        renderMobileCards();
        
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "block";
        
        // Initial clean state calculation
        liveCalculate();
    }

    // Core Scheduling Engine (Greedy approach with strict backtracking logic)
    function autoScheduleEngine() {
        generatedMatches = [];
        const slotsPerMatch = isDouble ? 2 : 1;
        const slotsPerRound = numCourts * slotsPerMatch;

        // Track state variables
        let playedCountA = Array(playersPerGroup + 1).fill(0);
        let playedCountB = Array(playersPerGroup + 1).fill(0);
        let consecutiveA = Array(playersPerGroup + 1).fill(0);
        let consecutiveB = Array(playersPerGroup + 1).fill(0);

        for (let r = 1; r <= numRounds; r++) {
            let roundSelectedA = [];
            let roundSelectedB = [];

            // Helper inner picker function
            const pickPlayersForRound = (consecutiveArr, playedArr, globalSelected) => {
                let pool = [];
                for (let i = 1; i <= playersPerGroup; i++) pool.push(i);

                // Sort algorithm order prioritizes: 
                // 1. Avoid consecutive > 1 (hard constraints)
                // 2. Play Count balance (fairness)
                pool.sort((x, y) => {
                    let cx = consecutiveArr[x], cy = consecutiveArr[y];
                    if (cx >= 2 && cy < 2) return 1;
                    if (cy >= 2 && cx < 2) return -1;
                    return playedArr[x] - playedArr[y];
                });

                return pool.slice(0, slotsPerRound);
            };

            let roundA = pickPlayersForRound(consecutiveA, playedCountA, roundSelectedA);
            let roundB = pickPlayersForRound(consecutiveB, playedCountB, roundSelectedB);

            // Update matching pools index status states
            for (let i = 1; i <= playersPerGroup; i++) {
                if (roundA.includes(i)) {
                    playedCountA[i]++;
                    consecutiveA[i]++;
                } else {
                    consecutiveA[i] = 0;
                }

                if (roundB.includes(i)) {
                    playedCountB[i]++;
                    consecutiveB[i]++;
                } else {
                    consecutiveB[i] = 0;
                }
            }

            // Slice out individuals into court distribution slots
            for (let c = 0; c < numCourts; c++) {
                let matchA = [], matchB = [];
                for (let s = 0; s < slotsPerMatch; s++) {
                    matchA.push("A" + roundA[c * slotsPerMatch + s]);
                    matchB.push("B" + roundB[c * slotsPerMatch + s]);
                }
                generatedMatches.push({
                    round: r,
                    court: `${c + 1}号场`,
                    a: matchA,
                    b: matchB
                });
            }
        }
        return true;
    }

    function renderMobileCards() {
        const container = document.getElementById("dynamicScheduleList");
        let html = "";
        
        for (let r = 1; r <= numRounds; r++) {
            html += `<div class="round-container">
                        <div class="round-title">第 ${r} 轮</div>`;
            
            generatedMatches.filter(m => m.round === r).forEach((match) => {
                const globalIdx = generatedMatches.indexOf(match);
                
                let namesA = match.a.map(code => nameMapA[code]).join("<br>");
                let namesB = match.b.map(code => nameMapB[code]).join("<br>");

                html += `
                    <div class="match-card">
                        <span class="court-label">${match.court}</span>
                        <div class="team-players team-a">${namesA}</div>
                        <div class="score-area">
                            <input type="number" inputmode="numeric" class="score-num" id="sA_${globalIdx}" oninput="liveCalculate()">
                            <span class="colon">:</span>
                            <input type="number" inputmode="numeric" class="score-num" id="sB_${globalIdx}" oninput="liveCalculate()">
                        </div>
                        <div class="team-players team-b">${namesB}</div>
                    </div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    function liveCalculate() {
        let statsA = {}, statsB = {};
        for (let k in nameMapA) statsA[nameMapA[k]] = { name: nameMapA[k], win: 0, lose: 0, diffScore: 0, totalScore: 0 };
        for (let k in nameMapB) statsB[nameMapB[k]] = { name: nameMapB[k], win: 0, lose: 0, diffScore: 0, totalScore: 0 };

        let totalWinA = 0, totalWinB = 0, totalScoreA = 0, totalScoreB = 0;

        for (let i = 0; i < generatedMatches.length; i++) {
            const elA = document.getElementById(`sA_${i}`);
            const elB = document.getElementById(`sB_${i}`);
            const valA = elA ? elA.value : "";
            const valB = elB ? elB.value : "";

            if (valA === "" || valB === "") continue;

            const scoreA = parseInt(valA);
            const scoreB = parseInt(valB);
            if (scoreA === scoreB) continue; 

            totalScoreA += scoreA;
            totalScoreB += scoreB;
            const isWinA = scoreA > scoreB;
            if (isWinA) totalWinA++; else totalWinB++;

            generatedMatches[i].a.forEach(code => {
                let p = nameMapA[code];
                if(statsA[p]) {
                    if (isWinA) statsA[p].win++; else statsA[p].lose++;
                    statsA[p].totalScore += scoreA;
                    statsA[p].diffScore += (scoreA - scoreB);
                }
            });

            generatedMatches[i].b.forEach(code => {
                let p = nameMapB[code];
                if(statsB[p]) {
                    if (!isWinA) statsB[p].win++; else statsB[p].lose++;
                    statsB[p].totalScore += scoreB;
                    statsB[p].diffScore += (scoreB - scoreA);
                }
            });
        }

        // Group summary display layout
        let winnerText = "比赛激战中...";
        if (totalWinA > totalWinB) winnerText = "<span class='winner-tag'>A 组暂时领先! 🏆</span>";
        else if (totalWinB > totalWinA) winnerText = "<span class='winner-tag'>B 组暂时领先! 🏆</span>";
        else if (totalScoreA !== totalScoreB) {
            winnerText = totalScoreA > totalScoreB ? "胜场战平，A 组凭总小分领先" : "胜场战平，B 组凭总小分领先";
        } else if (totalWinA > 0) {
            winnerText = "🤝 双方绝对战平，比分咬得极紧！";
        }

        document.getElementById("groupSummary").innerHTML = `
            <b>A 组总战绩：</b> ${totalWinA} 胜 (${totalScoreA} 分) <br>
            <span style="color:#bdc3c7;font-size:0.8rem;">VS</span><br>
            <b>B 组总战绩：</b> ${totalWinB} 胜 (${totalScoreB} 分)<br>
            <div style="margin-top:5px;font-size:0.85rem;color:#f1c40f;">${winnerText}</div>
        `;

        // Priority sorting rules handler
        const sortRule = (x, y) => {
            if (y.win !== x.win) return y.win - x.win;
            if (y.diffScore !== x.diffScore) return y.diffScore - x.diffScore;
            return y.totalScore - x.totalScore;
        };

        let listA = Object.values(statsA).sort(sortRule);
        let listB = Object.values(statsB).sort(sortRule);

        renderRankRows("rankA", listA);
        renderRankRows("rankB", listB);
    }

    function renderRankRows(elementId, sortedData) {
        const tbody = document.getElementById(elementId);
        let html = "";
        sortedData.forEach((p, idx) => {
            let medal = idx === 0 ? "🥇" : (idx === 1 ? "🥈" : (idx === 2 ? "🥉" : idx + 1));
            html += `<tr>
                <td style="font-weight:bold;">${medal}</td>
                <td style="font-weight:bold;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</td>
                <td style="color:#27ae60;font-weight:600;">${p.win}-${p.lose}</td>
                <td style="color:${p.diffScore >= 0 ? 'var(--red)' : '#34495e'}">${p.diffScore > 0 ? '+' + p.diffScore : p.diffScore}</td>
                <td>${p.totalScore}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    function resetAllTournament() {
        if(confirm("确定要清空当前的全部比赛积分，重新配置新的比赛吗？")) {
            document.getElementById("step3").style.display = "none";
            document.getElementById("step1").style.display = "block";
        }
    }
</script>
</body>
</html>
