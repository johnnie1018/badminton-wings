<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>羽翼齐飞 - 智能对抗与轮转赛事系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* CSS Variables - Default Light Mode */
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-text: #1c1c1e;
            --ios-subtext: #8e8e93;
            --ios-primary: #34c759;     
            --ios-primary-dark: #248a3d;
            --ios-orange: #ff9500;      
            --ios-blue: #007aff;        
            --ios-red: #ff3b30;         
            --ios-gray: #e5e5ea;
            --border-light: #e5e5ea;
            --ios-glass: rgba(242, 242, 247, 0.85);
            --radius-main: 14px;
            --radius-sub: 10px;
        }

        /* Auto-adaptive Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;
                --ios-card: #1c1c1e;
                --ios-text: #ffffff;
                --ios-subtext: #98989d;
                --ios-primary: #30d158;
                --ios-primary-dark: #248a3d;
                --ios-orange: #ff9f0a;
                --ios-blue: #0a84ff;
                --ios-red: #ff453a;
                --ios-gray: #2c2c2e;
                --border-light: #3a3a3c;
                --ios-glass: rgba(0, 0, 0, 0.85);
            }
            .match-card-unlocked { background-color: #1c1c1e !important; border-color: #3a3a3c !important; }
            .match-card-unlocked .score-area { background-color: #2c2c2e !important; }
            .match-card-unlocked .team-players { color: #ffffff !important; }
            .match-card-unlocked .score-num { color: #ffffff !important; }
            
            .match-card-locked { background-color: #2c2c2e !important; border-color: #3a3a3c !important; }
            .match-card-locked .score-area { background-color: #3a3a3c !important; }
            .match-card-locked .team-players, .match-card-locked .score-num { color: #8e8e93 !important; }
            
            .court-label { background: #2c2c2e !important; border-color: #3a3a3c !important; color: #98989d !important; }
            .form-control, .name-input, .score-area { background-color: #2c2c2e !important; color: #fff !important; }
            .radio-group { background: #2c2c2e !important; }
            .radio-label:has(input:checked) { background: #1c1c1e !important; box-shadow: 0 2px 8px rgba(0,0,0,0.5) !important; color: #fff !important;}
            .rank-table { background: #1c1c1e !important; }
            .rank-table th { background: #2c2c2e !important; border-bottom: 1px solid #3a3a3c; }
            .rank-table td { border-bottom: 1px solid #2c2c2e; color: #fff; }
            .table-winner { background-color: #2c2c2e !important; border-color: #ff9f0a !important; }
            .table-winner th { background-color: #3a2a00 !important; color: #ff9f0a !important; }
            .table-loser { border-color: #3a3a3c !important; }
            .history-chip { background-color: #2c2c2e !important; color: #fff !important; border-color: #3a3a3c !important; }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: calc(12px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom)) 14px;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            position: relative;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin: 10px 0 2px 0;
            color: var(--ios-text);
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--ios-subtext);
            margin-bottom: 24px;
            font-weight: 500;
        }

        .fade-in-up {
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--ios-bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 4px solid var(--ios-gray);
            border-top-color: var(--ios-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .viewer-badge {
            background-color: var(--ios-orange);
            color: white;
            text-align: center;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
            box-shadow: 0 4px 12px rgba(255, 149, 0, 0.2);
        }

        .card {
            background: var(--ios-card);
            border-radius: var(--radius-main);
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.01);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--ios-subtext);
            margin: 24px 0 8px 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .history-chip-container {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding-bottom: 8px;
            margin-bottom: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .history-chip-container::-webkit-scrollbar { display: none; }
        .history-chip {
            background-color: #ffffff;
            border: 1px solid #e5e5ea;
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ios-text);
            white-space: nowrap;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            transition: transform 0.1s;
        }
        .history-chip:active { transform: scale(0.95); }

        .form-group {
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 12px;
        }
        .form-group:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: var(--ios-text);
        }
        .form-control {
            width: 100%;
            padding: 12px;
            background-color: #f2f2f7;
            border: none;
            border-radius: var(--radius-sub);
            font-size: 1rem;
            color: var(--ios-text);
            box-sizing: border-box;
            font-weight: 500;
        }
        .form-control:focus { outline: none; box-shadow: 0 0 0 2px rgba(0,122,255,0.2); }
        .radio-group {
            display: flex;
            background: #f2f2f7;
            padding: 3px;
            border-radius: var(--radius-sub);
            gap: 2px;
        }
        .radio-label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600 !important;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--ios-subtext);
            transition: all 0.2s;
        }
        .radio-label input { display: none; }
        .radio-label:has(input:checked) {
            background: var(--ios-card);
            color: var(--ios-text);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .name-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 8px;
        }
        .name-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sub);
            font-size: 0.95rem;
            font-weight: 600;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            background-color: #f2f2f7;
            color: var(--ios-text);
            transition: all 0.2s ease;
        }
        .name-input:focus {
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.15);
            outline: none;
        }
        .name-input::placeholder { color: #bcbcc0; font-weight: 400; }

        .btn-block {
            width: 100%;
            border: none;
            padding: 14px;
            font-size: 1rem;
            border-radius: var(--radius-main);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1.3;
        }
        .btn-block:active { transform: scale(0.98); opacity: 0.9; }
        .btn-orange { background-color: var(--ios-orange); box-shadow: 0 4px 12px rgba(255, 149, 0, 0.15); color: white; }
        .btn-teal { background-color: var(--ios-primary); box-shadow: 0 4px 12px rgba(52, 199, 121, 0.15); color: white; }
        .btn-blue { background-color: var(--ios-blue); box-shadow: 0 4px 12px rgba(0, 122, 255, 0.15); color: white; }
        .btn-white-glass { background-color: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.4); }
        
        .btn-title { font-size: 1.05rem; }
        .btn-subtitle { font-size: 0.75rem; opacity: 0.85; margin-top: 4px; font-weight: 500; }
        
        .round-container {
            margin-bottom: 20px;
            background: transparent;
        }
        .round-title {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 8px 6px 8px;
            color: var(--ios-subtext);
            text-transform: uppercase;
        }
        
        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        .shake-error {
            animation: shakeError 0.4s cubic-bezier(.36,.07,.19,.97) both;
            border-left: 4px solid var(--ios-red) !important;
            box-shadow: 0 0 16px rgba(255, 59, 48, 0.25) !important;
        }

        .match-card {
            position: relative;
            border-radius: var(--radius-main);
            padding: 12px 12px 14px 12px;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column; 
            gap: 12px;
            transition: all 0.3s ease;
            overflow: hidden;
            background-color: var(--ios-card);
        }
        
        .match-card-unlocked {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            border-left: 4px solid var(--ios-orange);
        }
        .match-card-unlocked .score-area { background-color: #f2f2f7; }
        .match-card-unlocked .score-num { color: var(--ios-text); }
        .match-card-unlocked .team-players { color: #2c3e50; }
        
        .match-card-locked {
            background-color: #e2e8f0; 
            box-shadow: none;
            border: 1px solid #cbd5e1;
        }
        .match-card-locked .score-area { background-color: #cbd5e1; }
        .match-card-locked .score-num { color: #64748b; font-weight: 600; }
        .match-card-locked .team-players { color: #64748b; }
        .match-card-locked .court-label { background-color: #cbd5e1; color: #ffffff; border: none; }

        .match-core-row {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 6px; 
        }
        
        .court-label {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 0.7rem;
            background: #f2f2f7;
            color: #8e8e93;
            padding: 4px 10px;
            border-bottom-right-radius: 10px;
            font-weight: 600;
            z-index: 1;
        }
        
        .team-players {
            flex: 1;
            font-weight: 700;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .team-a { text-align: right; padding-right: 6px; }
        .team-b { text-align: left; padding-left: 6px; }
        
        .score-area {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            flex-shrink: 0;
            border-radius: 20px;
            transition: all 0.2s ease;
        }
        
        @keyframes popScore {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); color: var(--ios-orange); }
            100% { transform: scale(1); }
        }
        .score-anim-pop {
            animation: popScore 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .score-num {
            width: 36px;
            height: 30px;
            font-size: 1.1rem;
            text-align: center;
            border: none;
            background: transparent;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .score-num:focus { outline: none; color: var(--ios-primary-dark); }
        .colon { font-weight: 700; color: #aeaeb2; margin: 0 2px; font-size: 1.1rem; }

        .action-lock-btn {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .btn-state-unlocked { background-color: rgba(0, 122, 255, 0.08); color: var(--ios-blue); }
        .btn-state-locked { background-color: rgba(142, 142, 147, 0.12); color: #48484a; }

        .summary-total {
            border-radius: var(--radius-main);
            padding: 16px;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.4s ease;
        }
        .summary-ongoing {
            background: #1c1c1e;
            color: white;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        .summary-finished {
            background: linear-gradient(135deg, #FF3B30, #FF9500); 
            color: #ffffff;
            box-shadow: 0 8px 24px rgba(255, 149, 0, 0.3);
            border: 2px solid #FFD60A;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--ios-card);
            border-radius: var(--radius-main);
            overflow: hidden;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .table-winner {
            border: 2px solid #FF9500;
            box-shadow: 0 4px 16px rgba(255, 149, 0, 0.15);
            background-color: #fffcf2; 
        }
        .table-winner th { background-color: #fffae8 !important; color: #d97706 !important; }
        .table-loser {
            opacity: 0.65;
            filter: grayscale(0.5);
            border: 1px solid #e5e5ea;
        }
        
        .rank-table th, .rank-table td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid #f2f2f7;
        }
        .rank-table th { 
            background: #fafafc; 
            color: var(--ios-subtext); 
            font-size: 0.8rem; 
            font-weight: 600;
        }
        .rank-table tr:last-child td { border-bottom: none; }
        .rank-table td { font-size: 0.95rem; }

        body.viewer-mode-active #sharingCardContainer { display: none !important; }
        body.viewer-mode-active .score-area { pointer-events: none !important; }
        body.viewer-mode-active .score-num { pointer-events: none !important; user-select: none !important; }
        body.viewer-mode-active .action-lock-btn { display: none !important; }

        .timeline-th-corner {
            border: 1px solid var(--border-light); 
            padding: 10px 8px; 
            background: var(--ios-bg); 
            position: sticky; 
            left: 0; 
            z-index: 3; 
            min-width: 65px; 
            font-weight:700; 
            color:var(--ios-text);
        }
        .timeline-th-round {
            border: 1px solid var(--border-light); 
            padding: 10px 4px; 
            background: var(--ios-bg); 
            font-weight: 700; 
            min-width: 38px; 
            color:var(--ios-text);
        }
        .timeline-name-cell {
            border: 1px solid var(--border-light); 
            padding: 10px 6px; 
            font-weight: 700; 
            background: var(--ios-card); 
            position: sticky; 
            left: 0; 
            z-index: 2; 
            box-shadow: 2px 0 4px rgba(0,0,0,0.02); 
            text-align: left; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            max-width: 75px; 
            color:var(--ios-text);
        }
        .timeline-cell-active {
            border: 1px solid var(--border-light); 
            padding: 4px; 
            color: white; 
            font-weight: 700; 
            font-size: 0.75rem; 
            border-radius:4px;
        }
        .timeline-cell-off {
            border: 1px solid var(--border-light); 
            padding: 4px; 
            background: var(--ios-bg); 
            color: var(--ios-subtext); 
            font-size: 0.75rem;
        }

        .timeline-cell { transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; }
        .dimmed-cell { opacity: 0.15 !important; filter: grayscale(100%); }
        .highlight-partner { box-shadow: 0 0 0 3px #FFD60A inset, 0 0 14px rgba(255, 214, 10, 0.9) !important; z-index: 10; position: relative; }
        .highlight-opponent { box-shadow: 0 0 0 3px #ff3b30 inset, 0 0 14px rgba(255, 59, 48, 0.7) !important; z-index: 10; position: relative; }
        .timeline-banner {
            background-color: #1c1c1e;
            color: white;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 0.95rem;
            display: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            animation: slideDown 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        
        .status-tag { font-size: 0.7rem; padding: 2px 6px; border-radius: 6px; margin-left: 6px; vertical-align: middle; }
        .status-crush { background-color: #ff3b30; color: white; }
        .status-tight { background-color: #ff9500; color: white; }
        .status-normal { background-color: #34c759; color: white; }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .close-hint { display: block; font-size: 0.75rem; color: #8e8e93; margin-top: 6px; font-weight: 500; }

        /* Universal Image Modal Styles */
        .img-preview-modal {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100000; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .img-preview-modal img {
            max-width: 100%; max-height: 70vh; border-radius: 12px; 
            box-shadow: 0 4px 30px rgba(0,0,0,0.6); margin-bottom: 24px;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .img-modal-tip {
            color: #ffffff; font-weight: 700; margin-bottom: 20px; font-size: 1.15rem;
            text-align: center; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            animation: slideDown 0.3s;
        }
        .modal-action-row {
            display: flex; gap: 12px; width: 100%; max-width: 320px;
        }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="spinner"></div>
    <div style="color:var(--ios-subtext); font-weight:600; font-size:0.9rem;">正在拉取云端实时赛况...</div>
</div>

<div id="imagePreviewModal" class="img-preview-modal">
    <div class="img-modal-tip">✨ 海报已生成<br><span style="font-size: 0.85rem; font-weight: 500; color: #FFD60A;">请长按下方图片保存到相册，或直接转发给朋友</span></div>
    <img id="previewImageSrc" src="" alt="战绩海报预览" />
    <div class="modal-action-row">
        <button class="btn-block btn-white-glass" style="flex:1;" onclick="document.getElementById('imagePreviewModal').style.display='none'">返回系统</button>
        <button class="btn-block btn-orange" id="btnNativeShare" style="flex:1; display:none;" onclick="triggerNativeShare()">📲 调起系统分享</button>
    </div>
</div>

<div class="container">
    <h1>羽翼齐飞</h1>
    <div class="subtitle">🏸 智能赛事编排与动态计分系统 🏸</div>
    
    <div id="viewerModeBadge" class="viewer-badge">👁️ 当前处于：群友实时观战模式（只读自动刷新）</div>

    <div id="step1" class="card fade-in-up">
        <div style="font-size: 1.15rem; font-weight: 700; margin-bottom: 16px; color: var(--ios-text);">赛事模式配置</div>
        
        <div class="form-group">
            <label>比赛类型</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="matchType" value="single" onchange="onParamChange()">单打 (1vs1)</label>
                <label class="radio-label"><input type="radio" name="matchType" value="double" checked onchange="onParamChange()">双打 (2vs2)</label>
            </div>
        </div>

        <div class="form-group">
            <label>分组数量 (组)</label>
            <input type="number" id="cfgGroups" class="form-control" value="2" min="1" oninput="onParamChange(); toggleCourtInput();">
        </div>

        <div class="form-group" id="courtInputRow">
            <label>可用场地数量 (个)</label>

            <div class="summary-total" id="groupSummary" style="display: none;"></div>
            <div id="dynamicRankTables"></div>
            <div id="posterWatermark" style="display:none; text-align:center; font-size:0.75rem; color:#8e8e93; margin-top:12px; font-weight:500;">数据由「羽翼齐飞」智能赛事云管家生成</div>

            <div class="btn-title">📸 一键生成战绩海报</div>

<script>
    const SYNC_BUS_URL = "https://ntfy.sh/yyqf_global_hub_"; 

    let isDouble = true;
    let numGroups = 2;
    let numCourts = 2;
    let numRounds = 9;
    let playersPerGroup = 6;
    let isViewerMode = false; 
    let currentRoomId = "master_session";
    let nameMap = {}; 
    let generatedMatches = []; 
    let activeHighlight = null; 
    let globalGeneratedImageBlob = null; 

    function toggleCourtInput() {
        const gNum = parseInt(document.getElementById("cfgGroups").value) || 1;
        document.getElementById("courtInputRow").style.display = (gNum === 1) ? "none" : "block";
    }

    function onParamChange() {
        isDouble = document.querySelector('input[name="matchType"]:checked').value === 'double';
        numGroups = parseInt(document.getElementById("cfgGroups").value) || 1;
        numCourts = numGroups === 1 ? 1 : (parseInt(document.getElementById("cfgCourts").value) || 1);
        playersPerGroup = parseInt(document.getElementById("cfgPlayers").value) || 6;

        const slotsPerMatch = isDouble ? 2 : 1;
        const errorTips = document.getElementById("errorTips");
        const selectEl = document.getElementById("cfgRoundsSelect");
        const btnNext = document.getElementById("btnNextStep");

        if (numGroups > 1) {
            const requiredPerRound = numCourts * slotsPerMatch;
            if (playersPerGroup < requiredPerRound) {
                errorTips.innerText = `❌ 人数不足！${numCourts}个场地进行${isDouble?'双':'单'}打，每组至少需要 ${requiredPerRound} 人。`;
                errorTips.style.display = "block";
                selectEl.innerHTML = "<option value=''>请修正人数...</option>";
                btnNext.disabled = true;
                return;
            }
        } else {
            const requiredTotal = isDouble ? 4 : 2;
            if (playersPerGroup < requiredTotal) {
                errorTips.innerText = `❌ 人数不足！内部轮转赛进行${isDouble?'双':'单'}打至少需要 ${requiredTotal} 人。`;
                errorTips.style.display = "block";
                selectEl.innerHTML = "<option value=''>请修正人数...</option>";
                btnNext.disabled = true;
                return;
            }
        }
        errorTips.style.display = "none";
        btnNext.disabled = false;

        let validRounds = [];
        for (let targetPlay = 1; targetPlay <= 15; targetPlay++) {
            let totalRound = 0;
            if (numGroups > 1) {
                let upper = playersPerGroup * targetPlay;
                let lower = numCourts * slotsPerMatch;
                if (upper % lower === 0) totalRound = upper / lower;
            } else {
                let upper = playersPerGroup * targetPlay;
                let lower = slotsPerMatch * 2;
                if (upper % lower === 0) totalRound = upper / lower;
            }

            if (totalRound > 0 && totalRound <= 30) {
                if (numGroups === 1 && totalRound === 1 && targetPlay === 1) continue;
                if (!validRounds.some(item => item.round === totalRound)) {
                    validRounds.push({ round: totalRound, plays: targetPlay });
                }
            }
        }

        if (validRounds.length === 0) {
            selectEl.innerHTML = "<option value=''>暂无完美匹配的对齐轮次，请调整人数</option>";
            btnNext.disabled = true;
        } else {
            let closestRoundObj = validRounds.reduce((prev, curr) => {
                return (Math.abs(curr.round - 9) < Math.abs(prev.round - 9)) ? curr : prev;
            });

            let validOptionsHtml = "";
            validRounds.forEach(r => {
                let isSelected = (r.round === closestRoundObj.round) ? "selected" : "";
                validOptionsHtml += `<option value="${r.round}" ${isSelected}>共 ${r.round} 轮比赛 (每人上场 ${r.plays} 次)</option>`;
            });
            selectEl.innerHTML = validOptionsHtml;
        }
    }

    function backToStep1() {
        document.getElementById("step2").style.display = "none";
        document.getElementById("step2").classList.remove("fade-in-up");
        document.getElementById("step1").style.display = "block";
    }

    function loadHistoryChips() {
        let hist = JSON.parse(localStorage.getItem('yuyiqifei_history_names') || '[]');
        if (hist.length > 0) {
            document.getElementById("historyChipsWrapper").style.display = "block";
            let html = hist.map(n => `<div class="history-chip" onclick="quickFillName('${n}')">${n}</div>`).join('');
            document.getElementById("historyChipsContainer").innerHTML = html;
        }
    }

    function quickFillName(name) {
        let inputs = document.querySelectorAll('.name-input');
        for (let i = 0; i < inputs.length; i++) {
            if (!inputs[i].value) { 
                inputs[i].value = name; 
                if(navigator.vibrate) navigator.vibrate(20);
                break; 
            }
        }
    }

    function goToStep2() {
        numRounds = parseInt(document.getElementById("cfgRoundsSelect").value) || 6;
        const nameSections = document.getElementById("dynamicNameSections");
        nameSections.innerHTML = "";
        
        const groupColors = ["var(--ios-red)", "var(--ios-blue)", "#9b59b6", "var(--ios-orange)", "var(--ios-primary)"];
        const defaultNamesPool = [
            ["张三", "李四", "王五", "赵六", "钱七", "孙八", "周九", "吴十"],
            ["阿华", "阿明", "阿强", "阿飞", "小丽", "小红", "小冬", "小宇"]
        ];

        for (let g = 1; g <= numGroups; g++) {
            const color = groupColors[(g-1) % groupColors.length];
            const groupLetter = String.fromCharCode(64 + g); 
            let html = `<span class="group-name-title" style="color:${color}; font-weight:700; margin-top:10px; font-size:0.95rem;">● ${numGroups === 1 ? '选手名单管理' : groupLetter + ' 组选手名单'}</span>`;
            html += `<div class="name-grid">`;
            for (let i = 1; i <= playersPerGroup; i++) {
                html += `<div class="name-item"><input type="text" id="inputName_G${g}_${i}" class="name-input" placeholder="选手姓名 ${i}"></div>`;
            }
            html += `</div>`;
            nameSections.innerHTML += html;
        }
        
        loadHistoryChips();
        
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
        document.getElementById("step2").classList.add("fade-in-up");
    }

    function lockNamesAndBuildAll() {
        nameMap = {};
        let collectedNames = [];
        const shuffle = (array) => {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        };

        for (let g = 1; g <= numGroups; g++) {
            let groupNames = [];
            let groupLetter = String.fromCharCode(64 + g);
            for (let i = 1; i <= playersPerGroup; i++) {
                let val = document.getElementById(`inputName_G${g}_${i}`).value.trim();
                let finalName = val || (numGroups === 1 ? `选手-${i}` : `${groupLetter}组-${i}`);
                groupNames.push(finalName);
                if (val) collectedNames.push(val); 
            }
            shuffle(groupNames);
            for (let i = 1; i <= playersPerGroup; i++) {
                nameMap[`G${g}_${i}`] = groupNames[i - 1];
            }
        }

        if(collectedNames.length > 0) {
            let oldHist = JSON.parse(localStorage.getItem('yuyiqifei_history_names') || '[]');
            let uniqueHist = Array.from(new Set([...collectedNames, ...oldHist])).slice(0, 30);
            localStorage.setItem('yuyiqifei_history_names', JSON.stringify(uniqueHist));
        }

        if(!autoScheduleEngine()) {
            alert("无法计算出完美对齐矩阵，请返回调整！");
            return;
        }

        currentRoomId = "rm_" + Math.random().toString(36).substr(2, 9) + Date.now().toString(36).substr(-3);
        window.history.replaceState(null, null, window.location.href.split('#')[0] + "#room=" + currentRoomId);

        generatedMatches.forEach(m => { m.isLocked = false; m.scoreA = ""; m.scoreB = ""; });

        renderTimelineMatrix();
        renderMobileCards();
        
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "block";
        document.getElementById("step3").classList.add("fade-in-up");
        
        saveGameFrameworkToStorage();
        liveCalculate(false); 
    }

    function autoScheduleEngine() {
        const slotsPerMatch = isDouble ? 2 : 1;
        let attempt = 0, maxAttempts = 300; 
        
        let bestSchedule = null;
        let bestScore = Infinity;

        while (attempt < maxAttempts) {
            attempt++; 
            let currentMatches = [];
            let playedCount = {}, consecutive = {}, partnerCount = {};  
            
            for (let g = 1; g <= numGroups; g++) {
                for (let i = 1; i <= playersPerGroup; i++) {
                    let key = `G${g}_${i}`; playedCount[key] = 0; consecutive[key] = 0; partnerCount[key] = {};
                }
            }

            function formBestPairs(players) {
                if (!isDouble) return players.map(p => [p]);
                if (players.length === 2) return [[players[0], players[1]]];
                if (players.length === 4) {
                    let p1 = players[0], p2 = players[1], p3 = players[2], p4 = players[3];
                    let c1 = (partnerCount[p1][p2] || 0) + (partnerCount[p3][p4] || 0);
                    let c2 = (partnerCount[p1][p3] || 0) + (partnerCount[p2][p4] || 0);
                    let c3 = (partnerCount[p1][p4] || 0) + (partnerCount[p2][p3] || 0);
                    
                    if (c1 <= c2 && c1 <= c3) return [[p1, p2], [p3, p4]];
                    if (c2 <= c1 && c2 <= c3) return [[p1, p3], [p2, p4]];
                    return [[p1, p4], [p2, p3]];
                }
                
                let remaining = [...players];
                let pairs = [];
                while(remaining.length > 0) {
                    let pA = remaining.shift();
                    let bestPBIdx = 0;
                    let minCount = Infinity;
                    for(let i=0; i<remaining.length; i++) {
                        let count = partnerCount[pA][remaining[i]] || 0;
                        if(count < minCount) { minCount = count; bestPBIdx = i; }
                    }
                    let pB = remaining.splice(bestPBIdx, 1)[0];
                    pairs.push([pA, pB]);
                }
                return pairs;
            }

            let failed = false;
            const targetPlays = numGroups > 1 ? (numRounds * numCourts * slotsPerMatch) / playersPerGroup : (numRounds * slotsPerMatch * 2) / playersPerGroup;

            for (let r = 1; r <= numRounds; r++) {
                if (numGroups > 1) {
                    let neededPerGroup = Array(numGroups + 1).fill(0), courtMatchups = [];
                    for (let c = 0; c < numCourts; c++) {
                        let gA = 1, gB = 2;
                        if (numGroups > 2) {
                            gA = ((r - 1 + c * 2) % numGroups) + 1; gB = ((r - 1 + c * 2 + 1) % numGroups) + 1;
                        }
                        courtMatchups.push({ gA, gB }); neededPerGroup[gA] += slotsPerMatch; neededPerGroup[gB] += slotsPerMatch;
                    }

                    let poolSelections = {};
                    for (let g = 1; g <= numGroups; g++) {
                        if (neededPerGroup[g] === 0) continue;
                        let pList = [];
                        for (let i = 1; i <= playersPerGroup; i++) {
                            let k = `G${g}_${i}`; if (playedCount[k] < targetPlays) pList.push(k);
                        }
                        pList.sort(() => Math.random() - 0.5); 
                        pList.sort((x, y) => {
                            let cx = consecutive[x], cy = consecutive[y];
                            if (cx >= 2 && cy < 2) return 1; if (cy >= 2 && cx < 2) return -1;
                            return playedCount[x] - playedCount[y];
                        });
                        if (pList.length < neededPerGroup[g]) { failed = true; break; }
                        poolSelections[g] = pList.slice(0, neededPerGroup[g]);
                    }
                    if (failed) break;

                    let groupPairs = {};
                    for (let g = 1; g <= numGroups; g++) {
                        if (poolSelections[g]) groupPairs[g] = formBestPairs(poolSelections[g]);
                    }

                    let roundUsedKeys = new Set();
                    for (let c = 0; c < numCourts; c++) {
                        let { gA, gB } = courtMatchups[c];
                        let matchA = groupPairs[gA].shift();
                        let matchB = groupPairs[gB].shift();
                        
                        if (isDouble) {
                            partnerCount[matchA[0]][matchA[1]] = (partnerCount[matchA[0]][matchA[1]] || 0) + 1;
                            partnerCount[matchA[1]][matchA[0]] = (partnerCount[matchA[1]][matchA[0]] || 0) + 1;
                            partnerCount[matchB[0]][matchB[1]] = (partnerCount[matchB[0]][matchB[1]] || 0) + 1;
                            partnerCount[matchB[1]][matchB[0]] = (partnerCount[matchB[1]][matchB[0]] || 0) + 1;
                        }

                        matchA.forEach(p => roundUsedKeys.add(p)); matchB.forEach(p => roundUsedKeys.add(p));
                        currentMatches.push({ round: r, court: `${c + 1}号场`, a: matchA, b: matchB });
                    }
                    for (let k in consecutive) {
                        if (roundUsedKeys.has(k)) { playedCount[k]++; consecutive[k]++; } else { consecutive[k] = 0; }
                    }
                } else {
                    let pList = [];
                    for (let i = 1; i <= playersPerGroup; i++) {
                        let k = `G1_${i}`; if (playedCount[k] < targetPlays) pList.push(k);
                    }
                    pList.sort(() => Math.random() - 0.5);
                    pList.sort((x, y) => {
                        let cx = consecutive[x], cy = consecutive[y];
                        if (cx >= 2 && cy < 2) return 1; if (cy >= 2 && cx < 2) return -1;
                        return playedCount[x] - playedCount[y];
                    });
                    const totalNeeded = slotsPerMatch * 2; if (pList.length < totalNeeded) { failed = true; break; }
                    let roundPicked = pList.slice(0, totalNeeded);
                    
                    let pairs = formBestPairs(roundPicked);
                    let matchA = pairs[0], matchB = pairs[1];
                    
                    if (isDouble) {
                        partnerCount[matchA[0]][matchA[1]] = (partnerCount[matchA[0]][matchA[1]] || 0) + 1;
                        partnerCount[matchA[1]][matchA[0]] = (partnerCount[matchA[1]][matchA[0]] || 0) + 1;
                        partnerCount[matchB[0]][matchB[1]] = (partnerCount[matchB[0]][matchB[1]] || 0) + 1;
                        partnerCount[matchB[1]][matchB[0]] = (partnerCount[matchB[1]][matchB[0]] || 0) + 1;
                    }

                    currentMatches.push({ round: r, court: `轮转对阵`, a: matchA, b: matchB });
                    let roundUsedKeys = new Set([...matchA, ...matchB]);
                    for (let k in consecutive) {
                        if (roundUsedKeys.has(k)) { playedCount[k]++; consecutive[k]++; } else { consecutive[k] = 0; }
                    }
                }
            }
            
            if (!failed) {
                let repeatPenalty = 0;
                for (let p1 in partnerCount) {
                    for (let p2 in partnerCount[p1]) {
                        if (partnerCount[p1][p2] > 1) {
                            repeatPenalty += Math.pow(partnerCount[p1][p2], 2);
                        }
                    }
                }
                
                if (repeatPenalty < bestScore) {
                    bestScore = repeatPenalty;
                    bestSchedule = JSON.parse(JSON.stringify(currentMatches));
                    if (bestScore === 0) break; 
                }
            }
        }
        
        if (bestSchedule) {
            generatedMatches = bestSchedule;
            return true;
        }
        return false;
    }

    function renderTimelineMatrix() {
        const container = document.getElementById("dynamicTimeline");
        container.innerHTML = "";
        activeHighlight = null; 
        
        let allPlayerKeys = [];
        for (let g = 1; g <= numGroups; g++) {
            for (let i = 1; i <= playersPerGroup; i++) allPlayerKeys.push(`G${g}_${i}`);
        }

        let html = `<div style="overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius:10px;">
                        <table style="width: 100%; border-collapse: collapse; min-width: 460px; font-size: 0.8rem; text-align: center;">
                            <thead>
                                <tr>
                                    <th class="timeline-th-corner">队员</th>`;
        for (let r = 1; r <= numRounds; r++) html += `<th class="timeline-th-round">R${r}</th>`;
        html += `</tr></thead><tbody>`;

        const groupHues = { 1: 350, 2: 210, 3: 280, 4: 30, 5: 170 };

        allPlayerKeys.forEach((pKey, idx) => {
            const pName = nameMap[pKey];
            html += `<tr><td class="timeline-name-cell">${pName}</td>`;
            
            for (let r = 1; r <= numRounds; r++) {
                let roundMatches = generatedMatches.filter(m => m.round === r);
                let playingMatch = roundMatches.find(m => m.a.includes(pKey) || m.b.includes(pKey));
                
                if (playingMatch) {
                    let textSymbol = "";
                    let bgColor = "";
                    
                    if (numGroups === 1) {
                        textSymbol = "&nbsp;&nbsp;"; 
                        let isTeamA = playingMatch.a.includes(pKey);
                        bgColor = isTeamA ? `hsl(350, 80%, 55%)` : `hsl(210, 80%, 55%)`;
                    } else {
                        textSymbol = playingMatch.court.replace("号场", "场");
                        let courtNumMatch = playingMatch.court.match(/\d+/);
                        let courtIdx = courtNumMatch ? parseInt(courtNumMatch[0]) : 1;
                        
                        let pGroup = parseInt(pKey.split('_')[0].substring(1));
                        let baseHue = groupHues[pGroup] || (pGroup * 50 % 360);
                        
                        let lightness = courtIdx % 2 === 1 ? 55 : 40;
                        let saturation = courtIdx % 2 === 1 ? 80 : 60;
                        
                        bgColor = `hsl(${baseHue}, ${saturation}%, ${lightness}%)`;
                    }

                    html += `<td id="cell_${r}_${pKey}" class="timeline-cell timeline-cell-active" onclick="handleTimelineClick(${r}, '${pKey}')" style="background: ${bgColor};">${textSymbol}</td>`;
                } else {
                    html += `<td class="timeline-cell timeline-cell-off" id="cell_${r}_${pKey}_off">休</td>`;
                }
            }
            html += `</tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    function handleTimelineClick(r, pKey) {
        const banner = document.getElementById("timelineBanner");
        
        if (activeHighlight === `${r}_${pKey}`) {
            clearTimelineHighlight();
            return;
        }
        activeHighlight = `${r}_${pKey}`;

        let match = generatedMatches.find(m => m.round === r && (m.a.includes(pKey) || m.b.includes(pKey)));
        if (!match) {
            clearTimelineHighlight();
            return; 
        }

        let isTeamA = match.a.includes(pKey);
        let myTeam = isTeamA ? match.a : match.b;
        let oppTeam = isTeamA ? match.b : match.a;

        let namesA = match.a.map(k => nameMap[k]).join(" / ");
        let namesB = match.b.map(k => nameMap[k]).join(" / ");
        let courtStr = match.court === "轮转对阵" ? "轮转" : match.court;
        
        let colorA = isTeamA ? "#FFD60A" : "#ff453a";
        let colorB = !isTeamA ? "#FFD60A" : "#ff453a";
        
        let statusTag = "";
        if (match.isLocked) {
            let sA = parseInt(match.scoreA);
            let sB = parseInt(match.scoreB);
            if (!isNaN(sA) && !isNaN(sB)) {
                let diff = Math.abs(sA - sB);
                if (diff >= 10) statusTag = "<span class='status-tag status-crush'>🔥 碾压局</span>";
                else if (diff <= 2) statusTag = "<span class='status-tag status-tight'>⚔️ 焦灼激战</span>";
                else statusTag = "<span class='status-tag status-normal'>⚡ 精彩对决</span>";
            }
        }

        banner.innerHTML = `👉 第 ${r} 轮 ${courtStr} ${statusTag}<br><span style="color:${colorA}">${namesA}</span> <span style="color:#8e8e93; font-size:0.8rem; margin:0 4px;">VS</span> <span style="color:${colorB}">${namesB}</span><span class="close-hint">(点击此处关闭高亮)</span>`;
        banner.style.display = "block";

        document.querySelectorAll('.timeline-cell').forEach(el => {
            el.classList.remove('highlight-partner', 'highlight-opponent', 'dimmed-cell');
            
            let parts = el.id.split('_');
            if(parts.length < 4) return;
            let cellR = parseInt(parts[1]);
            let cellPKey = parts[2] + '_' + parts[3];

            if (cellR === r) {
                if (myTeam.includes(cellPKey)) {
                    el.classList.add('highlight-partner');
                } else if (oppTeam.includes(cellPKey)) {
                    el.classList.add('highlight-opponent');
                } else {
                    el.classList.add('dimmed-cell');
                }
            } else {
                el.classList.add('dimmed-cell'); 
            }
        });
    }

    function smartScoreInput(idx, side) {
        if(isViewerMode) return;
        
        let myInput = document.getElementById(`s${side}_${idx}`);
        let otherSide = side === 'A' ? 'B' : 'A';
        let otherInput = document.getElementById(`s${otherSide}_${idx}`);
        
        let val = myInput.value;
        
        // 核心规则 1：输入两位数触发逻辑
        if (val.length >= 2) {
            let num = parseInt(val);
            if (num < 20) {
                // 如果分数 < 20，必定是负方，对方直接自动填满 21 分
                if (!otherInput.value) {
                    otherInput.value = 21;
                    triggerPopAnim(otherInput);
                }
                myInput.blur(); // 完成当前对局输入，收起键盘
            } else {
                // 如果分数 >= 20 (比如 21, 22)，胜方已确认，跳转到另一边填负方分数
                if (!otherInput.value) {
                    otherInput.focus();
                } else {
                    myInput.blur();
                }
            }
        }
        cacheInputValuesOnly(idx);
    }

    function smartScoreBlur(idx, side) {
        if(isViewerMode) return;
        
        let myInput = document.getElementById(`s${side}_${idx}`);
        let otherSide = side === 'A' ? 'B' : 'A';
        let otherInput = document.getElementById(`s${otherSide}_${idx}`);
        
        let val = myInput.value;
        if (val !== "") {
            let num = parseInt(val);
            // 核心规则 2：如果是 1 位数（比如 9），只要焦点离开，立刻帮对方补齐 21
            if (num < 20 && !otherInput.value) {
                otherInput.value = 21;
                triggerPopAnim(otherInput);
                cacheInputValuesOnly(idx);
            }
        }
    }

    function triggerPopAnim(element) {
        element.classList.remove('score-anim-pop');
        void element.offsetWidth; // Force Reflow
        element.classList.add('score-anim-pop');
    }

    function cacheInputValuesOnly(idx) {
        let valA = document.getElementById(`sA_${idx}`) ? document.getElementById(`sA_${idx}`).value : "";
        let valB = document.getElementById(`sB_${idx}`) ? document.getElementById(`sB_${idx}`).value : "";
        generatedMatches[idx].scoreA = valA;
        generatedMatches[idx].scoreB = valB;
    }

    function toggleMatchLockGate(idx) {
        if(isViewerMode) return;
        
        let match = generatedMatches[idx];
        if (!match.isLocked) {
            // Check DOM directly in case blur hasn't fired
            let valA = document.getElementById(`sA_${idx}`) ? document.getElementById(`sA_${idx}`).value : "";
            let valB = document.getElementById(`sB_${idx}`) ? document.getElementById(`sB_${idx}`).value : "";
            
            if(valA === "" || valB === "" || parseInt(valA) === parseInt(valB)) {
                let cardEl = document.getElementById(`matchCard_${idx}`);
                cardEl.classList.remove('shake-error');
                void cardEl.offsetWidth; 
                cardEl.classList.add('shake-error');
                if(navigator.vibrate) navigator.vibrate([30, 50, 30]);
                return;
            }
            
            match.isLocked = true;
            match.scoreA = valA;
            match.scoreB = valB;
            if(navigator.vibrate) navigator.vibrate(50);
        } else {
            match.isLocked = false;
        }
        
        saveGameFrameworkToStorage();
        renderMobileCards();
        liveCalculate(true); 
    }

    function liveCalculate(shouldPushToCloud = true) {
        let stats = {};
        for (let k in nameMap) stats[nameMap[k]] = { name: nameMap[k], win: 0, lose: 0, diffScore: 0, totalScore: 0, group: k.split('_')[0] };

        let totalWinA = 0, totalWinB = 0, totalScoreA = 0, totalScoreB = 0;
        let currentScoresCache = {}; 
        
        let totalMatchCount = generatedMatches.length;
        let lockedMatchCount = 0;

        for (let i = 0; i < generatedMatches.length; i++) {
            let valA = generatedMatches[i].scoreA || "";
            let valB = generatedMatches[i].scoreB || "";

            currentScoresCache[`sA_${i}`] = valA; currentScoresCache[`sB_${i}`] = valB;
            
            if (generatedMatches[i].isLocked) {
                lockedMatchCount++;
                const scoreA = parseInt(valA), scoreB = parseInt(valB);
                const isWinA = scoreA > scoreB;

                if (numGroups === 2) {
                    totalScoreA += scoreA; totalScoreB += scoreB;
                    if (isWinA) totalWinA++; else totalWinB++;
                }

                generatedMatches[i].a.forEach(k => {
                    let p = nameMap[k];
                    if (stats[p]) {
                        if (isWinA) stats[p].win++; else stats[p].lose++;
                        stats[p].totalScore += scoreA; stats[p].diffScore += (scoreA - scoreB);
                    }
                });
                generatedMatches[i].b.forEach(k => {
                    let p = nameMap[k];
                    if (stats[p]) {
                        if (!isWinA) stats[p].win++; else stats[p].lose++;
                        stats[p].totalScore += scoreB; stats[p].diffScore += (scoreB - scoreA);
                    }
                });
            }
        }

        const isAllFinished = (totalMatchCount > 0 && lockedMatchCount === totalMatchCount);

        if (!isViewerMode) {
            localStorage.setItem("yuyiqifei_scores", JSON.stringify(currentScoresCache));
            if (shouldPushToCloud) {
                pushStateToCloud(currentScoresCache);
            }
        }

        const sortRule = (x, y) => {
            if (y.win !== x.win) return y.win - x.win;
            if (y.diffScore !== x.diffScore) return y.diffScore - x.diffScore;
            return y.totalScore - x.totalScore;
        };

        const summaryBox = document.getElementById("groupSummary");
        const exportBtn = document.getElementById("btnExportImage");

        let winningGroup = "";
        if (numGroups === 2) {
            if (totalWinA > totalWinB) winningGroup = "G1";
            else if (totalWinB > totalWinA) winningGroup = "G2";
            else if (totalScoreA !== totalScoreB) winningGroup = totalScoreA > totalScoreB ? "G1" : "G2";
            else winningGroup = "TIE";
        }

        if (isAllFinished) {
            exportBtn.style.display = "flex";
            summaryBox.className = "summary-total summary-finished";
            
            if (numGroups === 2) {
                let winText = winningGroup === "G1" ? "🏆 A 组 夺得总冠军！ 🎉" : (winningGroup === "G2" ? "🏆 B 组 夺得总冠军！ 🎉" : "🤝 双方握手言和，势均力敌！");
                summaryBox.innerHTML = `
                    <div style="font-size: 1.25rem; font-weight: 800; margin-bottom: 10px; text-shadow: 0 1px 2px rgba(0,0,0,0.1);">${winText}</div>
                    <div style="font-size: 0.95rem; font-weight: 600; opacity: 0.95;">
                        A 组：${totalWinA} 胜 (${totalScoreA}分) &nbsp;&nbsp;|&nbsp;&nbsp; B 组：${totalWinB} 胜 (${totalScoreB}分)
                    </div>
                `;
            } else {
                let subList = Object.values(stats).filter(p => p.group === `G1`).sort(sortRule);
                let champion = subList.length > 0 ? subList[0].name : "神秘选手";
                summaryBox.innerHTML = `
                    <div style="font-size: 1.25rem; font-weight: 800; margin-bottom: 10px; text-shadow: 0 1px 2px rgba(0,0,0,0.1);">🏆 恭喜 ${champion} 荣获总冠军！ 🎉</div>
                    <div style="font-size: 0.95rem; font-weight: 600; opacity: 0.95;">个人积分赛圆满结束，感谢所有选手的拼搏！</div>
                `;
            }
            summaryBox.style.display = "block";
        } else {
            exportBtn.style.display = "none";
            if (numGroups === 2) {
                summaryBox.className = "summary-total summary-ongoing";
                let leadText = "⚔️ 双方激烈抗衡中...";
                if (winningGroup === "G1") leadText = "🔥 A 组 暂时领先";
                else if (winningGroup === "G2") leadText = "🔥 B 组 暂时领先";
                
                summaryBox.innerHTML = `
                    <div style="display: flex; justify-content: space-around; font-weight: 600; margin-bottom: 8px;">
                        <span>A 组: <span style="color:var(--ios-primary)">${totalWinA} 胜</span> (${totalScoreA}分)</span>
                        <span style="color: rgba(255,255,255,0.3)">|</span>
                        <span>B 组: <span style="color:var(--ios-blue)">${totalWinB} 胜</span> (${totalScoreB}分)</span>
                    </div>
                    <div style="color:#ffcc00; font-size:0.85rem; font-weight:700;">${leadText} (赛程进度 ${lockedMatchCount}/${totalMatchCount})</div>
                `;
                summaryBox.style.display = "block";
            } else {
                summaryBox.style.display = "none";
            }
        }

        const tablesContainer = document.getElementById("dynamicRankTables");
        tablesContainer.innerHTML = "";

        for (let g = 1; g <= numGroups; g++) {
            let subList = Object.values(stats).filter(p => p.group === `G${g}`).sort(sortRule);
            
            let groupStateClass = "";
            let groupTitlePrefix = numGroups === 1 ? "" : (g === 1 ? "A" : "B");
            let groupTitleText = numGroups === 1 ? `👑 全员个人战绩榜` : `📊 ${groupTitlePrefix} 组战绩排名`;
            let titleStyle = `font-weight: 700; color: var(--ios-subtext); margin-top:16px; margin-bottom: 6px; font-size:0.9rem; padding-left:4px;`;

            if (isAllFinished) {
                if (numGroups === 2) {
                    if (`G${g}` === winningGroup) {
                        groupStateClass = "table-winner";
                        groupTitleText = `🏆 ${groupTitlePrefix} 组 (冠军组) 荣耀榜`;
                        titleStyle = `font-weight: 800; color: #ff9500; margin-top:20px; margin-bottom: 8px; font-size:1.05rem; padding-left:4px;`;
                    } else if (winningGroup !== "TIE") {
                        groupStateClass = "table-loser";
                        groupTitleText = `⚪ ${groupTitlePrefix} 组 (惜败) 战绩排名`;
                        titleStyle = `font-weight: 600; color: #8e8e93; margin-top:16px; margin-bottom: 6px; font-size:0.85rem; padding-left:4px;`;
                    }
                } else {
                    groupStateClass = "table-winner";
                    groupTitleText = `🏆 全员战绩荣耀榜`;
                    titleStyle = `font-weight: 800; color: #ff9500; margin-top:20px; margin-bottom: 8px; font-size:1.05rem; padding-left:4px;`;
                }
            } else if (numGroups === 2 && `G${g}` === winningGroup) {
                 groupTitleText = `🔥 ${groupTitlePrefix} 组战绩排名 (领先)`;
            }

            let html = `
                <div style="${titleStyle}">${groupTitleText}</div>
                <table class="rank-table ${groupStateClass}">
                    <thead><tr><th style="width: 15%;">排名</th><th style="width: 32%;">队员</th><th style="width: 21%;">胜 - 负</th><th style="width: 17%;">净胜</th><th style="width: 15%;">得分</th></tr></thead>
                    <tbody>
            `;
            
            subList.forEach((p, idx) => {
                let medal = idx === 0 ? "🥇" : (idx === 1 ? "🥈" : (idx === 2 ? "🥉" : `<span style="color:var(--ios-subtext); font-weight:500;">${idx + 1}</span>`));
                html += `<tr><td style="font-weight:700;">${medal}</td><td style="font-weight:700; color:var(--ios-text);">${p.name}</td><td style="color:var(--ios-primary-dark); font-weight:600;">${p.win} - ${p.lose}</td><td style="font-weight:600; color:${p.diffScore >= 0 ? 'var(--ios-red)' : 'var(--ios-text)'}">${p.diffScore > 0 ? '+' + p.diffScore : p.diffScore}</td><td style="color:var(--ios-subtext); font-weight:500;">${p.totalScore}</td></tr>`;
            });
            html += `</tbody></table>`;
            tablesContainer.innerHTML += html;
        }
    }

    function dataURItoBlob(dataURI) {
        var byteString = atob(dataURI.split(',')[1]);
        var mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
        var ab = new ArrayBuffer(byteString.length);
        var ia = new Uint8Array(ab);
        for (var i = 0; i < byteString.length; i++) {
            ia[i] = byteString.charCodeAt(i);
        }
        return new Blob([ab], {type: mimeString});
    }

    function loadDataFromLocalStorage() {
        isDouble = localStorage.getItem("yuyiqifei_isDouble") === "true";
        numGroups = parseInt(localStorage.getItem("yuyiqifei_numGroups"));
        numCourts = parseInt(localStorage.getItem("yuyiqifei_numCourts"));
        numRounds = parseInt(localStorage.getItem("yuyiqifei_numRounds"));
        playersPerGroup = parseInt(localStorage.getItem("yuyiqifei_playersPerGroup"));
        nameMap = JSON.parse(localStorage.getItem("yuyiqifei_nameMap"));

    async function pushStateToCloud(scoresMap = null) {
        if (!currentRoomId || isViewerMode) return;
        const targetScores = scoresMap || JSON.parse(localStorage.getItem("yuyiqifei_scores") || "{}");
        const snapshotPayload = { isDouble, numGroups, numCourts, numRounds, playersPerGroup, nameMap, generatedMatches, scores: targetScores };
        
        try {
            const safeDataStream = encodeURIComponent(JSON.stringify(snapshotPayload));
            const base64Packet = btoa(unescape(safeDataStream));
            
            await fetch(SYNC_BUS_URL + currentRoomId, {
                method: 'POST',
                body: base64Packet
            });
        } catch(e) { console.warn("Cloud stream sync upstream latency detected."); }
    }

    function setupLiveSyncStream() {
        if (!currentRoomId || !isViewerMode) return;
        
        try {
            if (window.liveSyncSource) {
                window.liveSyncSource.close();
            }
            
            window.liveSyncSource = new EventSource(`${SYNC_BUS_URL}${currentRoomId}/sse`);
            
            window.liveSyncSource.onmessage = (event) => {
                try {
                    const logObj = JSON.parse(event.data);
                    if (logObj.event === 'message' && logObj.message) {
                        const decodedPayload = JSON.parse(decodeURIComponent(escape(atob(logObj.message))));
                        
                        isDouble = decodedPayload.isDouble; 
                        numGroups = decodedPayload.numGroups; 
                        numCourts = decodedPayload.numCourts;
                        numRounds = decodedPayload.numRounds; 
                        playersPerGroup = decodedPayload.playersPerGroup;
                        nameMap = decodedPayload.nameMap; 
                        generatedMatches = decodedPayload.generatedMatches;
                        
                        clearTimelineHighlight();
                        renderTimelineMatrix();
                        renderMobileCards();

                        if (decodedPayload.scores) {
                            for (let id in decodedPayload.scores) {
                                let inputNode = document.getElementById(id);
                                if (inputNode && inputNode.value !== decodedPayload.scores[id]) {
                                    inputNode.value = decodedPayload.scores[id];
                                    
                                    inputNode.classList.remove('score-anim-pop');
                                    void inputNode.offsetWidth;
                                    inputNode.classList.add('score-anim-pop');
                                }
                            }
                        }
                        liveCalculate(false); 
                    }
                } catch(ex) { console.warn("Live stream packet decoding skipped."); }
            };
            
        } catch(e) { console.error("SSE stream boot failure."); }
    }

    async function fetchStateFromCloud() {
        if (!currentRoomId) return;
        try {
            const res = await fetch(`${SYNC_BUS_URL}${currentRoomId}/json?poll=1`);
            if (res.status === 200) {
                const text = await res.text();
                if(!text.trim()) return;
                
                const lines = text.trim().split("\n");
                let latestPayloadString = "";
                
                for (let i = lines.length - 1; i >= 0; i--) {
                    if (!lines[i]) continue;
                    const logObj = JSON.parse(lines[i]);
                    if (logObj.event === 'message' && logObj.message) {
                        latestPayloadString = logObj.message;
                        break;
                    }
                }

                if (latestPayloadString) {
                    const decodedPayload = JSON.parse(decodeURIComponent(escape(atob(latestPayloadString))));
                    
                    if (isViewerMode) {
                        isDouble = decodedPayload.isDouble; numGroups = decodedPayload.numGroups; numCourts = decodedPayload.numCourts;
                        numRounds = decodedPayload.numRounds; playersPerGroup = decodedPayload.playersPerGroup;
                        nameMap = decodedPayload.nameMap; generatedMatches = decodedPayload.generatedMatches;
                        
                        renderTimelineMatrix();
                        renderMobileCards();

                        document.getElementById("step1").style.display = "none";
                        document.getElementById("step2").style.display = "none";
                        document.getElementById("step3").style.display = "block";
                        document.getElementById("step3").classList.add("fade-in-up");
                    }

                    for (let id in decodedPayload.scores) {
                        let inputNode = document.getElementById(id);
                        if (inputNode && inputNode.value !== decodedPayload.scores[id]) {
                            inputNode.value = decodedPayload.scores[id];
                        }
                    }
                    liveCalculate(false);
                }
            }
        } catch(e) { console.warn("Cloud parsing pipeline skip."); }
    }

    function pollUrlHashChanges() {
        if (!window.liveSyncSource || window.liveSyncSource.readyState === EventSource.CLOSED) {
            setupLiveSyncStream();
        }
    }

    async function checkAndRestoreHistory() {
        const hash = window.location.hash;

        if (hash.startsWith("#room=")) {
            const roomIdFromUrl = hash.replace("#room=", "").split('&')[0];
            const isLocalAdminTokenPresent = roomIdFromUrl && (localStorage.getItem("admin_room_" + roomIdFromUrl) === "true");
            
            if (!isLocalAdminTokenPresent) {
                isViewerMode = true;
                document.body.classList.add("viewer-mode-active"); 
                document.getElementById("viewerModeBadge").style.display = "block";
                document.getElementById("btnWipeSystem").style.display = "none";
                document.getElementById("step1").style.display = "none"; 
                
                const shareCard = document.getElementById("sharingCardContainer");
                shareCard.innerHTML = `
                    <div style="font-size: 1.05rem; font-weight: 700; color: var(--ios-subtext); margin-bottom: 2px;">👁️ 智能赛事云分发通道</div>
                    <div style="font-size: 0.8rem; font-weight: 500; color: #aeaeb2;">您正在实时观战本场比赛，比分将自动同步刷新</div>
                `;
                
                currentRoomId = roomIdFromUrl;

                document.getElementById("loadingOverlay").style.display = "flex";
                await fetchStateFromCloud();
                document.getElementById("loadingOverlay").style.display = "none";
                
                setupLiveSyncStream();
                setInterval(pollUrlHashChanges, 5000); 
            } else {
                isViewerMode = false;
                currentRoomId = roomIdFromUrl;
                document.body.classList.remove("viewer-mode-active");
                document.getElementById("viewerModeBadge").style.display = "none";
                document.getElementById("sharingCardContainer").style.display = "block";
                loadDataFromLocalStorage();
            }
            return;
        }

        if (localStorage.getItem("yuyiqifei_active") === "true") {
            isViewerMode = false;
            document.body.classList.remove("viewer-mode-active");
            document.getElementById("viewerModeBadge").style.display = "none";
            document.getElementById("sharingCardContainer").style.display = "block";
            loadDataFromLocalStorage();
            return;
        }
        onParamChange();
    }

    function resetAllTournament() {
        if (confirm("确定要彻底删除当前比赛并重组新一局吗？该操作不可撤销！")) {
            let savedHistory = localStorage.getItem('yuyiqifei_history_names');
            localStorage.clear(); 
            if (savedHistory) {
                localStorage.setItem('yuyiqifei_history_names', savedHistory);
            }
            if (window.liveSyncSource) {
                window.liveSyncSource.close(); 
            }
            window.location.replace(window.location.href.split('#')[0]);
        }
    }

    window.onload = checkAndRestoreHistory;
</script>
