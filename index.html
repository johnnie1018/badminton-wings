<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羽毛球排班计分系统(全景时间轴版)</title>
    <style>
        :root {
            --primary: #1abc9c;
            --primary-dark: #16a085;
            --red: #e74c3c;
            --blue: #3498db;
            --bg: #f5f7f9;
            --card-bg: #ffffff;
            --text: #2c3e50;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            font-size: 14px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.3rem;
            text-align: center;
            margin: 15px 0 5px 0;
            color: #1a252f;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 15px;
        }

        .section-title {
            font-size: 1.1rem;
            margin: 20px 0 10px 0;
            padding-left: 8px;
            border-left: 4px solid var(--primary-dark);
            font-weight: bold;
        }

        /* Form Controls styling */
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }
        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal !important;
        }

        /* Name inputs layout setup (3 rows 2 cols optimization) */
        .group-name-title {
            font-weight: bold;
            display: block;
            margin: 12px 0 6px 0;
            padding-bottom: 3px;
        }
        .name-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px 12px;
            margin-bottom: 15px;
        }
        .name-item {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
        }
        .name-label-text {
            font-weight: bold;
            min-width: 32px;
            color: #7f8c8d;
        }
        .name-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
        }

        /* Button elements UI mapping */
        .btn-block {
            width: 100%;
            border: none;
            padding: 14px;
            font-size: 1rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }
        .btn-orange { background-color: #e67e22; }
        .btn-orange:active { background-color: #d35400; }
        .btn-teal { background-color: var(--primary); }
        .btn-teal:active { background-color: var(--primary-dark); }

        /* Match scoring layout cards */
        .round-container {
            margin-bottom: 15px;
            background: #eaeded;
            border-radius: 8px;
            padding: 4px;
        }
        .round-title {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 10px;
            color: #34495e;
        }
        .match-card {
            background: var(--card-bg);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .match-card:last-child { margin-bottom: 0; }
        .court-label {
            font-size: 0.75rem;
            background: #95a5a6;
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
            min-width: 40px;
            text-align: center;
        }
        .team-players {
            width: 33%;
            font-weight: 600;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .team-a { color: var(--red); text-align: right; }
        .team-b { color: var(--blue); text-align: left; }
        .score-area {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28%;
        }
        .score-num {
            width: 38px;
            height: 32px;
            font-size: 1.1rem;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-weight: bold;
        }
        .colon { font-weight: bold; color: #7f8c8d; margin: 0 4px; }

        /* Leaderboard and statistics styling table components */
        .summary-total {
            background: #2c3e50;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.05);
        }
        .rank-table th, .rank-table td {
            padding: 10px 6px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
        }
        .rank-table th { background: #f8f9fa; color: #7f8c8d; font-size: 0.8rem; }
        .winner-tag { color: #2ecc71; font-weight: bold; }
        .error-tips { color: var(--red); font-size: 0.85rem; margin-top: 5px; display: none;}
    </style>
</head>
<body>

<div class="container">
    <h1>羽毛球智能排班计分系统</h1>

    <!-- Step 1: Configurations setup -->
    <div id="step1" class="card">
        <div style="font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">第一步：赛事模式配置</div>
        
        <div class="form-group">
            <label>比赛类型</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="matchType" value="single"> 单打 (1vs1)</label>
                <label class="radio-label"><input type="radio" name="matchType" value="double" checked> 双打 (2vs2)</label>
            </div>
        </div>

        <div class="form-group">
            <label>分组数量 (组)</label>
            <input type="number" id="cfgGroups" class="form-control" value="2" min="1" oninput="toggleCourtInput()">
        </div>

        <div class="form-group" id="courtInputRow">
            <label>可用场地数量 (个)</label>
            <input type="number" id="cfgCourts" class="form-control" value="2" min="1">
        </div>

        <div class="form-group">
            <label>预计比赛轮数 (轮)</label>
            <input type="number" id="cfgRounds" class="form-control" value="9" min="1">
        </div>

        <div class="form-group">
            <label>每组人员数量 (人/组)</label>
            <input type="number" id="cfgPlayers" class="form-control" value="6" min="2">
            <div id="errorTips" class="error-tips"></div>
        </div>

        <button type="button" class="btn-block btn-orange" onclick="goToStep2()">下一步：录入选手名单</button>
    </div>

    <!-- Step 2: Name inputs allocation area -->
    <div id="step2" class="card" style="display: none;">
        <div style="font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 5px;">第二步：录入选手姓名</div>
        <div id="dynamicNameSections"></div>
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button type="button" class="btn-block btn-orange" style="width: 35%; background-color: #95a5a6;" onclick="backToStep1()">返回修改</button>
            <button type="button" class="btn-block btn-teal" style="width: 65%;" onclick="lockNamesAndBuildAll()">锁定名单并生成赛程</button>
        </div>
    </div>

    <!-- Step 3 & 4: Live tracking schedule & standings -->
    <div id="step3" style="display: none;">
        <!-- NEW: Timeline Grid Visualization View -->
        <div class="section-title">✨ 赛程时间轴 (横向滑动查看各轮次)</div>
        <div class="card" id="timelineWrapper" style="padding: 8px; overflow: hidden;">
            <div id="dynamicTimeline"></div>
        </div>

        <div class="section-title">第三步：比分录入表单</div>
        <div id="dynamicScheduleList"></div>

        <div class="section-title">第四步：实时战绩展示</div>
        <div class="summary-total" id="groupSummary" style="display: none;"></div>
        <div id="dynamicRankTables"></div>
        
        <button type="button" class="btn-block btn-orange" style="margin-top:10px; background-color: #e74c3c;" onclick="resetAllTournament()">清空整个赛事重新配置</button>
    </div>
</div>

<script>
    let isDouble = true;
    let numGroups = 2;
    let numCourts = 2;
    let numRounds = 9;
    let playersPerGroup = 6;
    
    let nameMap = {}; 
    let generatedMatches = []; 

    function toggleCourtInput() {
        const gNum = parseInt(document.getElementById("cfgGroups").value) || 1;
        const row = document.getElementById("courtInputRow");
        if (gNum === 1) {
            row.style.display = "none";
        } else {
            row.style.display = "block";
        }
    }

    function backToStep1() {
        document.getElementById("step2").style.display = "none";
        document.getElementById("step1").style.display = "block";
    }

    function goToStep2() {
        isDouble = document.querySelector('input[name="matchType"]:checked').value === 'double';
        numGroups = parseInt(document.getElementById("cfgGroups").value) || 1;
        numCourts = numGroups === 1 ? 1 : (parseInt(document.getElementById("cfgCourts").value) || 1);
        numRounds = parseInt(document.getElementById("cfgRounds").value) || 5;
        playersPerGroup = parseInt(document.getElementById("cfgPlayers").value) || 6;

        const slotsPerMatch = isDouble ? 2 : 1;
        const errorTips = document.getElementById("errorTips");
        
        if (numGroups > 1) {
            const requiredPerRound = numCourts * slotsPerMatch;
            if (playersPerGroup < requiredPerRound) {
                errorTips.innerText = `❌ 人数不足！${numCourts}个场地打${isDouble?'双':'单'}打，对抗赛每组至少需要 ${requiredPerRound} 人。`;
                errorTips.style.display = "block";
                return;
            }
        } else {
            const requiredTotal = isDouble ? 4 : 2;
            if (playersPerGroup < requiredTotal) {
                errorTips.innerText = `❌ 人数不足！内部轮转赛进行${isDouble?'双':'单'}打至少需要 ${requiredTotal} 人。`;
                errorTips.style.display = "block";
                return;
            }
        }
        errorTips.style.display = "none";

        const nameSections = document.getElementById("dynamicNameSections");
        nameSections.innerHTML = "";
        
        const groupColors = ["#e74c3c", "#3498db", "#9b59b6", "#e67e22", "#2ecc71"];
        const defaultNamesPool = [
            ["张三", "李四", "王五", "赵六", "钱七", "孙八", "周九", "吴十"],
            ["阿华", "阿明", "阿强", "阿飞", "小丽", "小红", "小冬", "小宇"],
            ["大锤", "铁柱", "翠花", "二狗", "顺子", "英子", "木兰", "长风"]
        ];

        for (let g = 1; g <= numGroups; g++) {
            const color = groupColors[(g-1) % groupColors.length];
            const groupLetter = String.fromCharCode(64 + g); 
            const titleText = numGroups === 1 ? `选手名单管理` : `${groupLetter} 组选手名单`;
            
            let html = `<span class="group-name-title" style="color:${color};">● ${titleText}</span>`;
            html += `<div class="name-grid">`;
            
            for (let i = 1; i <= playersPerGroup; i++) {
                let defaultVal = (defaultNamesPool[g-1] && defaultNamesPool[g-1][i-1]) || `${groupLetter}${i}`;
                html += `
                    <div class="name-item">
                        <span class="name-label-text">${groupLetter}${i}:</span>
                        <input type="text" id="inputName_G${g}_${i}" class="name-input" value="${defaultVal}">
                    </div>`;
            }
            html += `</div>`;
            nameSections.innerHTML += html;
        }

        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "block";
    }

    function lockNamesAndBuildAll() {
        for (let g = 1; g <= numGroups; g++) {
            for (let i = 1; i <= playersPerGroup; i++) {
                nameMap[`G${g}_${i}`] = document.getElementById(`inputName_G${g}_${i}`).value.trim() || `${String.fromCharCode(64+g)}${i}`;
            }
        }

        autoScheduleEngine();
        
        // Render components including the new Visual Timeline Matrix
        renderTimelineMatrix();
        renderMobileCards();
        renderRankTablesFramework();
        
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "block";
        
        liveCalculate();
    }

    function autoScheduleEngine() {
        generatedMatches = [];
        const slotsPerMatch = isDouble ? 2 : 1;

        let playedCount = {};  
        let consecutive = {};  
        for (let g = 1; g <= numGroups; g++) {
            for (let i = 1; i <= playersPerGroup; i++) {
                let key = `G${g}_${i}`;
                playedCount[key] = 0;
                consecutive[key] = 0;
            }
        }

        for (let r = 1; r <= numRounds; r++) {
            if (numGroups > 1) {
                let neededPerGroup = Array(numGroups + 1).fill(0);
                let courtMatchups = [];

                for (let c = 0; c < numCourts; c++) {
                    let gA = 1; 
                    let gB = 2;
                    if (numGroups > 2) {
                        gA = ((r - 1 + c * 2) % numGroups) + 1;
                        gB = ((r - 1 + c * 2 + 1) % numGroups) + 1;
                    }
                    courtMatchups.push({ gA, gB });
                    neededPerGroup[gA] += slotsPerMatch;
                    neededPerGroup[gB] += slotsPerMatch;
                }

                let poolSelections = {};
                for (let g = 1; g <= numGroups; g++) {
                    if (neededPerGroup[g] === 0) continue;
                    
                    let pList = [];
                    for (let i = 1; i <= playersPerGroup; i++) pList.push(`G${g}_${i}`);

                    pList.sort((x, y) => {
                        let cx = consecutive[x], cy = consecutive[y];
                        if (cx >= 2 && cy < 2) return 1;
                        if (cy >= 2 && cx < 2) return -1;
                        return playedCount[x] - playedCount[y];
                    });

                    poolSelections[g] = pList.slice(0, neededPerGroup[g]);
                }

                let roundUsedKeys = new Set();
                for (let c = 0; c < numCourts; c++) {
                    let { gA, gB } = courtMatchups[c];
                    let matchA = [], matchB = [];
                    
                    for (let s = 0; s < slotsPerMatch; s++) {
                        let pA = poolSelections[gA].shift();
                        let pB = poolSelections[gB].shift();
                        matchA.push(pA);
                        matchB.push(pB);
                        roundUsedKeys.add(pA);
                        roundUsedKeys.add(pB);
                    }

                    generatedMatches.push({
                        round: r,
                        court: `${c + 1}号场`,
                        a: matchA,
                        b: matchB
                    });
                }

                for (let k in consecutive) {
                    if (roundUsedKeys.has(k)) { playedCount[k]++; consecutive[k]++; } 
                    else { consecutive[k] = 0; }
                }

            } else {
                let pList = [];
                for (let i = 1; i <= playersPerGroup; i++) pList.push(`G1_${i}`);

                pList.sort((x, y) => {
                    let cx = consecutive[x], cy = consecutive[y];
                    if (cx >= 2 && cy < 2) return 1;
                    if (cy >= 2 && cx < 2) return -1;
                    return playedCount[x] - playedCount[y];
                });

                const totalNeeded = slotsPerMatch * 2; 
                let roundPicked = pList.slice(0, totalNeeded);

                let matchA = [], matchB = [];
                for (let s = 0; s < slotsPerMatch; s++) {
                    matchA.push(roundPicked.shift());
                    matchB.push(roundPicked.shift());
                }

                generatedMatches.push({
                    round: r,
                    court: `轮转对阵`,
                    a: matchA,
                    b: matchB
                });

                let roundUsedKeys = new Set([...matchA, ...matchB]);
                for (let k in consecutive) {
                    if (roundUsedKeys.has(k)) { playedCount[k]++; consecutive[k]++; } 
                    else { consecutive[k] = 0; }
                }
            }
        }
    }

    // NEW: Analytical Visual Timeline Matrix Renderer with sticky left column mapping
    function renderTimelineMatrix() {
        const container = document.getElementById("dynamicTimeline");
        container.innerHTML = "";

        let allPlayerKeys = [];
        for (let g = 1; g <= numGroups; g++) {
            for (let i = 1; i <= playersPerGroup; i++) {
                allPlayerKeys.push(`G${g}_${i}`);
            }
        }

        let html = `<div style="overflow-x: auto; -webkit-overflow-scrolling: touch;">
                        <table style="width: 100%; border-collapse: collapse; min-width: 480px; font-size: 0.8rem; text-align: center;">
                            <thead>
                                <tr>
                                    <th style="border: 1px solid #e2e8f0; padding: 8px 6px; background: #f8fafc; position: sticky; left: 0; z-index: 3; min-width: 65px; box-shadow: 1px 0 0 #e2e8f0;">队员</th>`;
        
        for (let r = 1; r <= numRounds; r++) {
            html += `<th style="border: 1px solid #e2e8f0; padding: 8px 4px; background: #f8fafc; font-weight: bold; min-width: 42px;">R${r}</th>`;
        }
        html += `</tr></thead><tbody>`;

        allPlayerKeys.forEach((pKey, idx) => {
            const pName = nameMap[pKey];
            // Assign unique distinct color using dynamic HSL loop
            const hue = (idx * 360) / allPlayerKeys.length;
            const uniqueColor = `hsl(${hue}, 70%, 45%)`;

            html += `<tr>
                        <td style="border: 1px solid #e2e8f0; padding: 8px 4px; font-weight: bold; background: #ffffff; position: sticky; left: 0; z-index: 2; box-shadow: 2px 0 4px rgba(0,0,0,0.04); text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70px;">${pName}</td>`;

            for (let r = 1; r <= numRounds; r++) {
                let roundMatches = generatedMatches.filter(m => m.round === r);
                let playingMatch = roundMatches.find(m => m.a.includes(pKey) || m.b.includes(pKey));

                if (playingMatch) {
                    let textSymbol = playingMatch.court.replace("号场", "场");
                    if (numGroups === 1) textSymbol = "上场";
                    html += `<td style="border: 1px solid #e2e8f0; padding: 4px; background: ${uniqueColor}; color: white; font-weight: bold; font-size: 0.75rem;">${textSymbol}</td>`;
                } else {
                    html += `<td style="border: 1px solid #e2e8f0; padding: 4px; background: #f1f5f9; color: #94a3b8; font-size: 0.7rem;">休</td>`;
                }
            }
            html += `</tr>`;
        });

        html += `</tbody></table></div>`;
        container.innerHTML = html;
    }

    function renderMobileCards() {
        const container = document.getElementById("dynamicScheduleList");
        let html = "";
        
        for (let r = 1; r <= numRounds; r++) {
            html += `<div class="round-container">
                        <div class="round-title">第 ${r} 轮</div>`;
            
            generatedMatches.filter(m => m.round === r).forEach((match) => {
                const globalIdx = generatedMatches.indexOf(match);
                let namesA = match.a.map(k => nameMap[k]).join("<br>");
                let namesB = match.b.map(k => nameMap[k]).join("<br>");

                html += `
                    <div class="match-card">
                        <span class="court-label" style="background:${numGroups===1?'#16a085':'#95a5a6'}">${match.court}</span>
                        <div class="team-players team-a">${namesA}</div>
                        <div class="score-area">
                            <input type="number" inputmode="numeric" class="score-num" id="sA_${globalIdx}" oninput="liveCalculate()">
                            <span class="colon">:</span>
                            <input type="number" inputmode="numeric" class="score-num" id="sB_${globalIdx}" oninput="liveCalculate()">
                        </div>
                        <div class="team-players team-b">${namesB}</div>
                    </div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    function renderRankTablesFramework() {
        const container = document.getElementById("dynamicRankTables");
        container.innerHTML = "";
        const groupColors = ["#e74c3c", "#3498db", "#9b59b6", "#e67e22", "#2ecc71"];

        for (let g = 1; g <= numGroups; g++) {
            const color = groupColors[(g-1) % groupColors.length];
            const groupLetter = String.fromCharCode(64 + g);
            const title = numGroups === 1 ? `👑 个人全员战绩大榜` : `🔴 ${groupLetter} 组内部战绩排名`;
            
            container.innerHTML += `
                <div style="font-weight: bold; color: ${color}; margin-top:15px; margin-bottom: 5px;">${title}</div>
                <table class="rank-table">
                    <thead>
                        <tr>
                            <th style="width: 15%;">排名</th>
                            <th style="width: 30%;">队员</th>
                            <th style="width: 20%;">胜-负</th>
                            <th style="width: 18%;">净胜分</th>
                            <th style="width: 17%;">得分</th>
                        </tr>
                    </thead>
                    <tbody id="rankBody_G${g}"></tbody>
                </table>`;
        }
    }

    function liveCalculate() {
        let stats = {};
        for (let k in nameMap) {
            stats[nameMap[k]] = { name: nameMap[k], win: 0, lose: 0, diffScore: 0, totalScore: 0, group: k.split('_')[0] };
        }

        let totalWinA = 0, totalWinB = 0, totalScoreA = 0, totalScoreB = 0;

        for (let i = 0; i < generatedMatches.length; i++) {
            const valA = document.getElementById(`sA_${i}`) ? document.getElementById(`sA_${i}`).value : "";
            const valB = document.getElementById(`sB_${i}`) ? document.getElementById(`sB_${i}`).value : "";

            if (valA === "" || valB === "") continue;

            const scoreA = parseInt(valA);
            const scoreB = parseInt(valB);
            if (scoreA === scoreB) continue; 

            const isWinA = scoreA > scoreB;

            if (numGroups === 2) {
                totalScoreA += scoreA;
                totalScoreB += scoreB;
                if (isWinA) totalWinA++; else totalWinB++;
            }

            generatedMatches[i].a.forEach(k => {
                let p = nameMap[k];
                if (isWinA) stats[p].win++; else stats[p].lose++;
                stats[p].totalScore += scoreA;
                stats[p].diffScore += (scoreA - scoreB);
            });

            generatedMatches[i].b.forEach(k => {
                let p = nameMap[k];
                if (!isWinA) stats[p].win++; else stats[p].lose++;
                stats[p].totalScore += scoreB;
                stats[p].diffScore += (scoreB - scoreA);
            });
        }

        const summaryBox = document.getElementById("groupSummary");
        if (numGroups === 2) {
            let winnerText = "抗衡中...";
            if (totalWinA > totalWinB) winnerText = "<span class='winner-tag'>A 组暂时领先! 🏆</span>";
            else if (totalWinB > totalWinA) winnerText = "<span class='winner-tag'>B 组暂时领先! 🏆</span>";
            else if (totalScoreA !== totalScoreB) winnerText = totalScoreA > totalScoreB ? "胜场平，A组小分占优" : "胜场平，B组小分占优";
            
            summaryBox.innerHTML = `
                <b>A 组红方：</b> ${totalWinA} 胜 (${totalScoreA}分)<br>
                <span style="color:#bdc3c7;font-size:0.75rem;">VS</span><br>
                <b>B 组蓝方：</b> ${totalWinB} 胜 (${totalScoreB}分)<br>
                <div style="color:#f1c40f;font-size:0.85rem;margin-top:3px;">${winnerText}</div>`;
            summaryBox.style.display = "block";
        } else {
            summaryBox.style.display = "none";
        }

        const sortRule = (x, y) => {
            if (y.win !== x.win) return y.win - x.win;
            if (y.diffScore !== x.diffScore) return y.diffScore - x.diffScore;
            return y.totalScore - x.totalScore;
        };

        for (let g = 1; g <= numGroups; g++) {
            let subList = Object.values(stats).filter(p => p.group === `G${g}`).sort(sortRule);
            let tbody = document.getElementById(`rankBody_G${g}`);
            if(!tbody) continue;
            
            let html = "";
            subList.forEach((p, idx) => {
                let medal = idx === 0 ? "🥇" : (idx === 1 ? "🥈" : (idx === 2 ? "🥉" : idx + 1));
                html += `<tr>
                    <td style="font-weight:bold;">${medal}</td>
                    <td style="font-weight:bold;">${p.name}</td>
                    <td style="color:#27ae60;font-weight:600;">${p.win}-${p.lose}</td>
                    <td style="color:${p.diffScore >= 0 ? 'var(--red)' : '#34495e'}">${p.diffScore > 0 ? '+' + p.diffScore : p.diffScore}</td>
                    <td>${p.totalScore}</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }
    }

    function resetAllTournament() {
        if (confirm("确定要清空当前的全部比赛与人员数据，重新开局吗？")) {
            document.getElementById("step3").style.display = "none";
            document.getElementById("step1").style.display = "block";
        }
    }
</script>
