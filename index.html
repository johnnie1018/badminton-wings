<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羽毛球AB双打对抗赛(全开实时版)</title>
    <style>
        :root {
            --primary: #1abc9c;
            --primary-dark: #16a085;
            --red: #e74c3c;
            --blue: #3498db;
            --bg: #f5f7f9;
            --card-bg: #ffffff;
            --text: #2c3e50;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            font-size: 14px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.4rem;
            text-align: center;
            margin: 15px 0 5px 0;
            color: #1a252f;
        }

        .notice {
            background-color: #e8f8f5;
            border-left: 4px solid var(--primary);
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .section-title {
            font-size: 1.1rem;
            margin: 20px 0 10px 0;
            padding-left: 8px;
            border-left: 4px solid var(--primary-dark);
            font-weight: bold;
        }

        /* 步骤1：人名录入区 (3行2排布局) */
        .name-box {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 15px;
        }
        .name-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px 15px;
            margin-bottom: 15px;
        }
        .name-item {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            color: #555;
        }
        .name-label-text {
            font-weight: bold;
            min-width: 25px;
        }
        .name-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.95rem;
            text-align: left;
            width: 100%;
            box-sizing: border-box;
        }
        .name-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* 按钮 */
        .btn-block {
            width: 100%;
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(230, 126, 34, 0.2);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-block:active {
            background-color: #d35400;
        }

        /* 步骤2：卡片式赛程 */
        .round-container {
            margin-bottom: 15px;
            background: #eaeded;
            border-radius: 8px;
            padding: 4px;
        }
        .round-title {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 6px 10px;
            color: #34495e;
        }
        .match-card {
            background: var(--card-bg);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 4px rgba(0,0,0,0.03);
        }
        .match-card:last-child { margin-bottom: 0; }
        
        .court-label {
            font-size: 0.75rem;
            background: #95a5a6;
            color: white;
            padding: 2px 5px;
            border-radius: 3px;
            min-width: 35px;
            text-align: center;
        }
        
        .team-players {
            width: 33%;
            font-weight: 600;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .team-a { color: var(--red); text-align: right; }
        .team-b { color: var(--blue); text-align: left; }
        
        .score-area {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28%;
        }
        .score-num {
            width: 38px;
            height: 32px;
            font-size: 1.1rem;
            text-align: center;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-weight: bold;
        }
        .score-num:focus {
            border-color: var(--primary);
            outline: none;
            background-color: #fafffb;
        }
        .colon {
            font-weight: bold;
            color: #7f8c8d;
            margin: 0 4px;
        }

        /* 步骤3：实时统计结果 */
        .summary-total {
            background: #2c3e50;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.5;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            margin-bottom: 20px;
        }
        .rank-table th, .rank-table td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
        }
        .rank-table th {
            background: #f8f9fa;
            font-weight: 600;
            font-size: 0.8rem;
            color: #7f8c8d;
        }
        
        .winner-tag {
            color: #2ecc71;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>羽毛球双打AB对抗赛</h1>
    
    <div class="notice">
        <strong>⚡ 实时重排机制：</strong>直接在下方录入比分，大榜会<strong>立刻自动计算并重新排序</strong>。如果修改了上方名单，点击“同步修改姓名”按钮即可实时刷新赛程表上显示的名字。
    </div>

    <div class="section-title">1. 录入两组人员姓名</div>
    <div class="name-box">
        <span style="color:var(--red); font-weight:bold; display:block; margin-bottom:8px;">🔴 A 组红方队员</span>
        <div class="name-grid">
            <div class="name-item"><span class="name-label-text">A1:</span><input type="text" id="name_A1" class="name-input" value="张三"></div>
            <div class="name-item"><span class="name-label-text">A2:</span><input type="text" id="name_A2" class="name-input" value="李四"></div>
            <div class="name-item"><span class="name-label-text">A3:</span><input type="text" id="name_A3" class="name-input" value="王五"></div>
            <div class="name-item"><span class="name-label-text">A4:</span><input type="text" id="name_A4" class="name-input" value="赵六"></div>
            <div class="name-item"><span class="name-label-text">A5:</span><input type="text" id="name_A5" class="name-input" value="钱七"></div>
            <div class="name-item"><span class="name-label-text">A6:</span><input type="text" id="name_A6" class="name-input" value="孙八"></div>
        </div>
        
        <span style="color:var(--blue); font-weight:bold; display:block; margin-top:15px; margin-bottom:8px;">🔵 B 组蓝方队员</span>
        <div class="name-grid">
            <div class="name-item"><span class="name-label-text">B1:</span><input type="text" id="name_B1" class="name-input" value="阿华"></div>
            <div class="name-item"><span class="name-label-text">B2:</span><input type="text" id="name_B2" class="name-input" value="阿明"></div>
            <div class="name-item"><span class="name-label-text">B3:</span><input type="text" id="name_B3" class="name-input" value="阿强"></div>
            <div class="name-item"><span class="name-label-text">B4:</span><input type="text" id="name_B4" class="name-input" value="阿飞"></div>
            <div class="name-item"><span class="name-label-text">B5:</span><input type="text" id="name_B5" class="name-input" value="小丽"></div>
            <div class="name-item"><span class="name-label-text">B6:</span><input type="text" id="name_B6" class="name-input" value="小红"></div>
        </div>
        <button type="button" class="btn-block" style="margin-top:5px;" onclick="syncNamesOnly()">同步修改姓名到下方赛程</button>
    </div>

    <div id="scheduleSection">
        <div class="section-title">2. 比分录入表单</div>
        <div id="scheduleList"></div>
    </div>

    <div id="resultsSection">
        <div class="section-title">3. 实时结果展示</div>
        
        <div class="summary-total" id="groupSummary"></div>

        <div style="font-weight: bold; color: var(--red); margin-bottom: 5px;">🔴 A 组内部排名 (胜场 > 净胜分 > 得分)</div>
        <table class="rank-table">
            <thead>
                <tr>
                    <th style="width: 15%;">排名</th>
                    <th style="width: 30%;">队员</th>
                    <th style="width: 20%;">胜-负</th>
                    <th style="width: 18%;">净胜分</th>
                    <th style="width: 17%;">得分</th>
                </tr>
            </thead>
            <tbody id="rankA"></tbody>
        </table>

        <div style="font-weight: bold; color: var(--blue); margin-bottom: 5px;">🔵 B 组内部排名 (胜场 > 净胜分 > 得分)</div>
        <table class="rank-table">
            <thead>
                <tr>
                    <th style="width: 15%;">排名</th>
                    <th style="width: 30%;">队员</th>
                    <th style="width: 20%;">胜-负</th>
                    <th style="width: 18%;">净胜分</th>
                    <th style="width: 17%;">得分</th>
                </tr>
            </thead>
            <tbody id="rankB"></tbody>
        </table>
    </div>
</div>

<script>
    // 完美的9轮、双场地、出场次数绝对均等矩阵
    const baseMatches = [
        { r: 1, c: "C1", a: ["A1", "A2"], b: ["B1", "B2"] }, { r: 1, c: "C2", a: ["A3", "A4"], b: ["B3", "B4"] },
        { r: 2, c: "C1", a: ["A5", "A6"], b: ["B5", "B6"] }, { r: 2, c: "C2", a: ["A1", "A3"], b: ["B2", "B5"] },
        { r: 3, c: "C1", a: ["A2", "A6"], b: ["B1", "B4"] }, { r: 3, c: "C2", a: ["A4", "A5"], b: ["B3", "B6"] },
        { r: 4, c: "C1", a: ["A1", "A5"], b: ["B1", "B3"] }, { r: 4, c: "C2", a: ["A2", "A4"], b: ["B4", "B6"] },
        { r: 5, c: "C1", a: ["A3", "A6"], b: ["B2", "B5"] }, { r: 5, c: "C2", a: ["A1", "A4"], b: ["B1", "B6"] },
        { r: 6, c: "C1", a: ["A2", "A5"], b: ["B2", "B4"] }, { r: 6, c: "C2", a: ["A3", "A6"], b: ["B3", "B5"] },
        { r: 7, c: "C1", a: ["A1", "A6"], b: ["B2", "B6"] }, { r: 7, c: "C2", a: ["A2", "A3"], b: ["B1", "B5"] },
        { r: 8, c: "C1", a: ["A4", "A5"], b: ["B3", "B4"] }, { r: 8, c: "C2", a: ["A1", "A2"], b: ["B3", "B6"] },
        { r: 9, c: "C1", a: ["A3", "A5"], b: ["B1", "B2"] }, { r: 9, c: "C2", a: ["A4", "A6"], b: ["B4", "B5"] }
    ];

    let nameMap = {};

    // 页面首次载入时，根据默认名字直接生成赛程和初始大榜
    function initOnLoad() {
        updateNameMap();
        renderScheduleList(true); // 初次渲染，保留比分值
        liveCalculate();
    }

    function updateNameMap() {
        for(let i=1; i<=6; i++) {
            nameMap["A" + i] = document.getElementById(`name_A${i}`).value.trim() || ("A" + i);
            nameMap["B" + i] = document.getElementById(`name_B${i}`).value.trim() || ("B" + i);
        }
    }

    // 纯改名字时的触发函数
    function syncNamesOnly() {
        updateNameMap();
        renderScheduleList(false); // 动态刷新名字，但不清空用户已经录入的比分
        liveCalculate();
    }

    // 渲染赛程卡片组件
    function renderScheduleList(isFirstTime) {
        const container = document.getElementById("scheduleList");
        let html = "";
        
        for (let r = 1; r <= 9; r++) {
            html += `<div class="round-container">
                        <div class="round-title">第 ${r} 轮</div>`;
            
            baseMatches.filter(m => m.r === r).forEach((match) => {
                const globalIdx = baseMatches.indexOf(match);
                const courtName = match.c === "C1" ? "1号场" : "2号场";
                
                // 保留已经填写的比分
                const oldValA = !isFirstTime && document.getElementById(`sA_${globalIdx}`) ? document.getElementById(`sA_${globalIdx}`).value : "";
                const oldValB = !isFirstTime && document.getElementById(`sB_${globalIdx}`) ? document.getElementById(`sB_${globalIdx}`).value : "";

                html += `
                    <div class="match-card">
                        <span class="court-label">${courtName}</span>
                        <div class="team-players team-a">${nameMap[match.a[0]]}<br>${nameMap[match.a[1]]}</div>
                        <div class="score-area">
                            <input type="number" inputmode="numeric" class="score-num" id="sA_${globalIdx}" value="${oldValA}" oninput="liveCalculate()">
                            <span class="colon">:</span>
                            <input type="number" inputmode="numeric" class="score-num" id="sB_${globalIdx}" value="${oldValB}" oninput="liveCalculate()">
                        </div>
                        <div class="team-players team-b">${nameMap[match.b[0]]}<br>${nameMap[match.b[1]]}</div>
                    </div>`;
            });
            html += `</div>`;
        }
        container.innerHTML = html;
    }

    // 完全实时的自动化统计算法
    function liveCalculate() {
        let playerStats = {};
        for(let i=1; i<=6; i++) {
            playerStats[nameMap["A" + i]] = { name: nameMap["A" + i], win: 0, lose: 0, diffScore: 0, totalScore: 0 };
            playerStats[nameMap["B" + i]] = { name: nameMap["B" + i], win: 0, lose: 0, diffScore: 0, totalScore: 0 };
        }

        let totalWinA = 0, totalWinB = 0, totalScoreA = 0, totalScoreB = 0;

        for (let i = 0; i < baseMatches.length; i++) {
            const elA = document.getElementById(`sA_${i}`);
            const elB = document.getElementById(`sB_${i}`);
            const valA = elA ? elA.value : "";
            const valB = elB ? elB.value : "";

            if (valA === "" || valB === "") continue;

            const scoreA = parseInt(valA);
            const scoreB = parseInt(valB);
            if (scoreA === scoreB) continue; 

            totalScoreA += scoreA;
            totalScoreB += scoreB;
            const isWinA = scoreA > scoreB;
            if (isWinA) totalWinA++; else totalWinB++;

            baseMatches[i].a.forEach(code => {
                let p = nameMap[code];
                if(playerStats[p]) {
                    if (isWinA) playerStats[p].win++; else playerStats[p].lose++;
                    playerStats[p].totalScore += scoreA;
                    playerStats[p].diffScore += (scoreA - scoreB);
                }
            });

            baseMatches[i].b.forEach(code => {
                let p = nameMap[code];
                if(playerStats[p]) {
                    if (!isWinA) playerStats[p].win++; else playerStats[p].lose++;
                    playerStats[p].totalScore += scoreB;
                    playerStats[p].diffScore += (scoreB - scoreA);
                }
            });
        }

        // 大组关系呈现
        let winnerText = "对抗赛火热进行中...";
        if (totalWinA > totalWinB) winnerText = "<span class='winner-tag'>A 组红方暂时领先! 🏆</span>";
        else if (totalWinB > totalWinA) winnerText = "<span class='winner-tag'>B 组蓝方暂时领先! 🏆</span>";
        else if (totalScoreA !== totalScoreB) {
            winnerText = totalScoreA > totalScoreB ? "胜场战平，A 组凭总小分微弱领先" : "胜场战平，B 组凭总小分微弱领先";
        } else if (totalWinA > 0) {
            winnerText = "🤝 胜场与得分完全一致，局势极度胶着！";
        }

        document.getElementById("groupSummary").innerHTML = `
            <b>A 组红方总计：</b> ${totalWinA} 胜 (${totalScoreA} 分) <br>
            <span style="color:#bdc3c7;font-size:0.8rem;">VS</span><br>
            <b>B 组蓝方总计：</b> ${totalWinB} 胜 (${totalScoreB} 分)<br>
            <div style="margin-top:5px;font-size:0.85rem;color:#f1c40f;">${winnerText}</div>
        `;

        // 排序优先级：胜场 > 净胜小分 > 总得分
        const sortRule = (x, y) => {
            if (y.win !== x.win) return y.win - x.win;
            if (y.diffScore !== x.diffScore) return y.diffScore - x.diffScore;
            return y.totalScore - x.totalScore;
        };

        let listA = [], listB = [];
        for(let i=1; i<=6; i++) {
            listA.push(playerStats[nameMap["A" + i]]);
            listB.push(playerStats[nameMap["B" + i]]);
        }
        listA.sort(sortRule);
        listB.sort(sortRule);

        renderTableRows("rankA", listA);
        renderTableRows("rankB", listB);
    }

    function renderTableRows(elementId, sortedData) {
        const tbody = document.getElementById(elementId);
        let html = "";
        sortedData.forEach((p, idx) => {
            let medal = idx === 0 ? "🥇" : (idx === 1 ? "🥈" : (idx === 2 ? "🥉" : idx + 1));
            html += `<tr>
                <td style="font-weight:bold;">${medal}</td>
                <td style="font-weight:bold;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.name}</td>
                <td style="color:#27ae60;font-weight:600;">${p.win}-${p.lose}</td>
                <td style="color:${p.diffScore >= 0 ? 'var(--red)' : '#34495e'}">${p.diffScore > 0 ? '+' + p.diffScore : p.diffScore}</td>
                <td>${p.totalScore}</td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    // 页面加载完毕后立即触发初始化
    window.onload = initOnLoad;
</script>
</body>
</html>
