<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>羽翼齐飞 - 智能对抗与轮转赛事系统</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-text: #1c1c1e;
            --ios-subtext: #8e8e93;
            --ios-primary: #34c759;     /* Apple Green */
            --ios-primary-dark: #248a3d;
            --ios-orange: #ff9500;      /* Apple Orange */
            --ios-blue: #007aff;        /* Apple Blue */
            --ios-red: #ff3b30;         /* Apple Red */
            --ios-gray: #e5e5ea;
            --radius-main: 14px;
            --radius-sub: 10px;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: calc(12px + env(safe-area-inset-top)) 14px calc(24px + env(safe-area-inset-bottom)) 14px;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin: 10px 0 2px 0;
            color: var(--ios-text);
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--ios-subtext);
            margin-bottom: 24px;
            font-weight: 500;
        }

        /* iOS Toast Badge */
        .viewer-badge {
            background-color: var(--ios-orange);
            color: white;
            text-align: center;
            padding: 8px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
            box-shadow: 0 4px 12px rgba(255, 149, 0, 0.2);
        }

        /* iOS Style Grouped Cards */
        .card {
            background: var(--ios-card);
            border-radius: var(--radius-main);
            padding: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.01);
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--ios-subtext);
            margin: 24px 0 8px 8px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* Form Controls Setup */
        .form-group {
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 12px;
        }
        .form-group:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: var(--ios-text);
        }
        .form-control {
            width: 100%;
            padding: 12px;
            background-color: #f2f2f7;
            border: none;
            border-radius: var(--radius-sub);
            font-size: 1rem;
            color: var(--ios-text);
            box-sizing: border-box;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .form-control:focus {
            background-color: #e5e5ea;
            outline: none;
        }
        .radio-group {
            display: flex;
            background: #f2f2f7;
            padding: 3px;
            border-radius: var(--radius-sub);
            gap: 2px;
        }
        .radio-label {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600 !important;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--ios-subtext);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .radio-label input {
            display: none;
        }
        .radio-label:has(input:checked) {
            background: var(--ios-card);
            color: var(--ios-text);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        /* iOS Capsule Inputs Grid Layout */
        .name-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 8px;
        }
        .name-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sub);
            font-size: 0.95rem;
            font-weight: 600;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            background-color: #f2f2f7;
            color: var(--ios-text);
            transition: all 0.2s ease;
        }
        .name-input:focus {
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.15);
            outline: none;
        }
        .name-input::placeholder {
            color: #bcbcc0;
            font-weight: 400;
        }

        /* iOS Spec Button Element Layout Mapping */
        .btn-block {
            width: 100%;
            border: none;
            padding: 14px;
            font-size: 1rem;
            border-radius: var(--radius-main);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        .btn-block:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .btn-orange { background-color: var(--ios-orange); box-shadow: 0 4px 12px rgba(255, 149, 0, 0.15); color: white; }
        .btn-teal { background-color: var(--ios-primary); box-shadow: 0 4px 12px rgba(52, 199, 121, 0.15); color: white; }
        .btn-blue { background-color: var(--ios-blue); box-shadow: 0 4px 12px rgba(0, 122, 255, 0.15); color: white; }
        
        /* App Style Match Rows Card Box Layout Mapping */
        .round-container {
            margin-bottom: 20px;
            background: transparent;
        }
        .round-title {
            font-size: 0.85rem;
            font-weight: 600;
            padding: 4px 8px 6px 8px;
            color: var(--ios-subtext);
            text-transform: uppercase;
        }
        .match-card {
            background: var(--ios-card);
            border-radius: var(--radius-main);
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.015);
            border: 1px solid rgba(0,0,0,0.005);
        }
        .match-card:last-child { margin-bottom: 0; }
        
        .court-label {
            font-size: 0.75rem;
            background: #e5e5ea;
            color: #555559;
            padding: 3px 6px;
            border-radius: 6px;
            font-weight: 600;
            min-width: 42px;
            text-align: center;
        }
        .team-players {
            width: 32%;
            font-weight: 600;
            font-size: 0.95rem;
            word-break: break-all;
            line-height: 1.3;
        }
        .team-a { color: var(--ios-red); text-align: right; }
        .team-b { color: var(--ios-blue); text-align: left; }
        
        .score-area {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28%;
            background: #f2f2f7;
            padding: 3px 6px;
            border-radius: 20px;
            transition: all 0.2s ease;
        }
        .score-num {
            width: 36px;
            height: 30px;
            font-size: 1.1rem;
            text-align: center;
            border: none;
            background: transparent;
            font-weight: 700;
            color: var(--ios-text);
        }
        .score-num:focus {
            outline: none;
            color: var(--ios-primary-dark);
        }
        .score-num[readonly] {
            color: #8e8e93;
            cursor: default;
        }
        .colon { font-weight: 700; color: #aeaeb2; margin: 0 2px; font-size: 1.1rem; }

        /* iOS Total Indicator Summary Component View Layout */
        .summary-total {
            background: #1c1c1e;
            color: white;
            padding: 16px;
            border-radius: var(--radius-main);
            text-align: center;
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.4;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }
        
        /* Cupertino Style Rank Tables View Component Handler Mapping */
        .rank-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--ios-card);
            border-radius: var(--radius-main);
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.01);
        }
        .rank-table th, .rank-table td {
            padding: 12px 10px;
            text-align: center;
            border-bottom: 1px solid #f2f2f7;
        }
        .rank-table th { 
            background: #fafafc; 
            color: var(--ios-subtext); 
            font-size: 0.8rem; 
            font-weight: 600;
        }
        .rank-table tr:last-child td {
            border-bottom: none;
        }
        .rank-table td {
            font-size: 0.95rem;
        }
        .winner-tag { color: var(--ios-primary); font-weight: bold; }

        /* ======================== 🛡️ CRITICAL VIEWER MODE LOCKS (CSS FORCE OVERRIDE) ======================== */
        body.viewer-mode-active #sharingCardContainer {
            background-color: transparent !important;
            padding: 0 !important;
            box-shadow: none !important;
            border: none !important;
        }
        body.viewer-mode-active #btnShareMatch {
            background: rgba(142, 142, 147, 0.12) !important;
            color: var(--ios-subtext) !important;
            box-shadow: none !important;
            pointer-events: none !important;
            cursor: default !important;
        }
        body.viewer-mode-active .score-area {
            background-color: #e5e5ea !important; /* Visual forced gray scale background badge */
            border: 1px solid rgba(0, 0, 0, 0.02) !important;
            pointer-events: none !important;      /* Block all physical tap gestures */
        }
        body.viewer-mode-active .score-num {
            color: #72727a !important;            /* Dim out the text score visibility */
            background-color: transparent !important;
            pointer-events: none !important;
            user-select: none !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>羽翼齐飞</h1>
    <div class="subtitle">🏸 智能赛事编排与动态计分系统 🏸</div>
    
    <div id="viewerModeBadge" class="viewer-badge">👁️ 当前处于：群友实时观战模式（只读自动刷新）</div>

    <div id="step1" class="card">
        <div style="font-size: 1.15rem; font-weight: 700; margin-bottom: 16px; color: var(--ios-text);">赛事模式配置</div>
        
        <div class="form-group">
            <label>比赛类型</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="matchType" value="single" onchange="onParamChange()">单打 (1vs1)</label>
                <label class="radio-label"><input type="radio" name="matchType" value="double" checked onchange="onParamChange()">双打 (2vs2)</label>
            </div>
        </div>

        <div class="form-group">
            <label>分组数量 (组)</label>
            <input type="number" id="cfgGroups" class="form-control" value="2" min="1" oninput="onParamChange(); toggleCourtInput();">
        </div>

        <div class="form-group" id="courtInputRow">
            <label>可用场地数量 (个)</label>
            <input type="number" id="cfgCourts" class="form-control" value="2" min="1" oninput="onParamChange()">
        </div>

        <div class="form-group">
            <label>每组人员数量 (人/组)</label>
            <input type="number" id="cfgPlayers" class="form-control" value="6" min="2" oninput="onParamChange()">
            <div id="errorTips" class="error-tips"></div>
        </div>

        <div class="form-group">
            <label style="color: var(--ios-primary-dark);">💡 选择比赛轮次 (已锁定出场数绝对相等)</label>
            <select id="cfgRoundsSelect" class="form-control" style="border: 1px solid rgba(52, 199, 89, 0.3); font-weight: 600; color: var(--ios-primary-dark); background-color: #f4fbf6;"></select>
        </div>

        <button type="button" class="btn-block btn-orange" id="btnNextStep" onclick="goToStep2()">下一步：录入选手名单</button>
    </div>

    <div id="step2" class="card" style="display: none;">
        <div style="font-size: 1.15rem; font-weight: 700; margin-bottom: 16px; color: var(--ios-text);">选手名单管理</div>
        <div id="dynamicNameSections"></div>
        
        <div style="display: flex; gap: 12px; margin-top: 20px;">
            <button type="button" class="btn-block btn-orange" style="width: 35%; background-color: #8e8e93; box-shadow: none;" onclick="backToStep1()">返回修改</button>
            <button type="button" class="btn-block btn-teal" style="width: 65%;" onclick="lockNamesAndBuildAll()">锁定名单并生成赛程</button>
        </div>
    </div>

    <div id="step3" style="display: none;">
        <div id="sharingCardContainer" class="card" style="padding: 12px; text-align: center; background-color: #eaf4ff; border: none; margin-bottom: 16px;">
            <button type="button" class="btn-block btn-blue" id="btnShareMatch" onclick="generateShareLink()">🔗 复制专属【永久观战链接】发送至群聊</button>
        </div>

        <div class="section-title">✨ 赛程时间轴 (横向滑动查看各轮次)</div>
        <div class="card" id="timelineWrapper" style="padding: 10px; overflow: hidden; background: var(--ios-card);">
            <div id="dynamicTimeline"></div>
        </div>

        <div class="section-title">第三步：比分录入表单</div>
        <div id="dynamicScheduleList"></div>

        <div class="section-title">第四步：实时战绩展示</div>
        <div class="summary-total" id="groupSummary" style="display: none;"></div>
        <div id="dynamicRankTables"></div>
        
        <button type="button" class="btn-block btn-orange" id="btnWipeSystem" style="margin-top:16px; background-color: var(--ios-red); box-shadow: 0 4px 12px rgba(255, 59, 48, 0.15);" onclick="resetAllTournament()">清空整个赛事重新配置</button>
    </div>
</div>
<script>
    const SYNC_BUS_URL = "https://ntfy.sh/yyqf_global_hub_";

    let isDouble = true;
    let numGroups = 2;
    let numCourts = 2;
    let numRounds = 9;
    let playersPerGroup = 6;

    let isViewerMode = false;
    let currentRoomId = "";

    let nameMap = {};
    let generatedMatches = [];

    let cloudSyncTimer = null;
    let cloudFetching = false;

    // =========================
    // UTF8 SAFE BASE64
    // =========================

    function utf8ToBase64(str) {
        const bytes = new TextEncoder().encode(str);
        let binary = "";

        bytes.forEach(b => {
            binary += String.fromCharCode(b);
        });

        return btoa(binary);
    }

    function base64ToUtf8(base64) {
        const binary = atob(base64);

        const bytes = Uint8Array.from(
            binary,
            c => c.charCodeAt(0)
        );

        return new TextDecoder().decode(bytes);
    }

    // =========================
    // CLOUD PUSH
    // =========================

    async function pushStateToCloud(scoresMap = null) {

        if (!currentRoomId || isViewerMode) return;

        const targetScores =
            scoresMap ||
            JSON.parse(
                localStorage.getItem("yuyiqifei_scores") || "{}"
            );

        for (let i = 0; i < generatedMatches.length; i++) {

            generatedMatches[i].scoreA =
                document.getElementById(`sA_${i}`)?.value || "";

            generatedMatches[i].scoreB =
                document.getElementById(`sB_${i}`)?.value || "";
        }

        const snapshotPayload = {
            isDouble,
            numGroups,
            numCourts,
            numRounds,
            playersPerGroup,
            nameMap,
            generatedMatches,
            scores: targetScores,
            ts: Date.now()
        };

        try {

            const jsonStr = JSON.stringify(snapshotPayload);

            const base64Packet = utf8ToBase64(jsonStr);

            await fetch(
                SYNC_BUS_URL + currentRoomId,
                {
                    method: "POST",
                    headers: {
                        "Cache-Control": "no-cache"
                    },
                    body: base64Packet
                }
            );

        } catch (e) {
            console.warn("pushStateToCloud failed", e);
        }
    }

    // =========================
    // CLOUD FETCH
    // =========================

    async function fetchStateFromCloud() {

        if (!currentRoomId) return;

        if (cloudFetching) return;

        cloudFetching = true;

        try {

            const res = await fetch(
                `${SYNC_BUS_URL}${currentRoomId}/json?since=1&t=${Date.now()}`,
                {
                    headers: {
                        "Cache-Control": "no-cache"
                    }
                }
            );

            if (!res.ok) {
                cloudFetching = false;
                return;
            }

            const text = await res.text();

            if (!text.trim()) {
                cloudFetching = false;
                return;
            }

            const lines =
                text
                    .trim()
                    .split("\n")
                    .filter(Boolean);

            if (lines.length === 0) {
                cloudFetching = false;
                return;
            }

            const latestLine = lines[lines.length - 1];

            const latest = JSON.parse(latestLine);

            if (!latest.message) {
                cloudFetching = false;
                return;
            }

            const decodedPayload = JSON.parse(
                base64ToUtf8(latest.message)
            );

            // =====================
            // 首次渲染
            // =====================

            const needRender =
                !generatedMatches ||
                generatedMatches.length === 0;

            isDouble = decodedPayload.isDouble;
            numGroups = decodedPayload.numGroups;
            numCourts = decodedPayload.numCourts;
            numRounds = decodedPayload.numRounds;
            playersPerGroup = decodedPayload.playersPerGroup;

            nameMap = decodedPayload.nameMap;
            generatedMatches = decodedPayload.generatedMatches;

            if (needRender) {

                renderTimelineMatrix();

                renderMobileCards();

                renderRankTablesFramework();

                document.getElementById("step1").style.display = "none";
                document.getElementById("step2").style.display = "none";
                document.getElementById("step3").style.display = "block";
            }

            // =====================
            // 更新比分
            // =====================

            const scores = decodedPayload.scores || {};

            for (let id in scores) {

                const inputNode =
                    document.getElementById(id);

                if (!inputNode) continue;

                if (inputNode.value !== scores[id]) {
                    inputNode.value = scores[id];
                }
            }

            liveCalculate(false);

        } catch (e) {

            console.warn(
                "fetchStateFromCloud failed",
                e
            );

        } finally {

            cloudFetching = false;
        }
    }

    // =========================
    // LIVE CALCULATION
    // =========================

    function liveCalculate(needPush = true) {

        let stats = {};

        for (let k in nameMap) {

            stats[nameMap[k]] = {
                name: nameMap[k],
                win: 0,
                lose: 0,
                diffScore: 0,
                totalScore: 0,
                group: k.split('_')[0]
            };
        }

        let totalWinA = 0;
        let totalWinB = 0;

        let totalScoreA = 0;
        let totalScoreB = 0;

        let currentScoresCache = {};

        for (let i = 0; i < generatedMatches.length; i++) {

            const valA =
                document.getElementById(`sA_${i}`)?.value || "";

            const valB =
                document.getElementById(`sB_${i}`)?.value || "";

            currentScoresCache[`sA_${i}`] = valA;
            currentScoresCache[`sB_${i}`] = valB;

            if (valA === "" || valB === "") continue;

            const scoreA = parseInt(valA);
            const scoreB = parseInt(valB);

            if (scoreA === scoreB) continue;

            const isWinA = scoreA > scoreB;

            if (numGroups === 2) {

                totalScoreA += scoreA;
                totalScoreB += scoreB;

                if (isWinA) {
                    totalWinA++;
                } else {
                    totalWinB++;
                }
            }

            generatedMatches[i].a.forEach(k => {

                const p = nameMap[k];

                if (!stats[p]) return;

                if (isWinA) {
                    stats[p].win++;
                } else {
                    stats[p].lose++;
                }

                stats[p].totalScore += scoreA;
                stats[p].diffScore += (scoreA - scoreB);
            });

            generatedMatches[i].b.forEach(k => {

                const p = nameMap[k];

                if (!stats[p]) return;

                if (!isWinA) {
                    stats[p].win++;
                } else {
                    stats[p].lose++;
                }

                stats[p].totalScore += scoreB;
                stats[p].diffScore += (scoreB - scoreA);
            });
        }

        // =====================
        // 本地保存
        // =====================

        if (!isViewerMode) {

            localStorage.setItem(
                "yuyiqifei_scores",
                JSON.stringify(currentScoresCache)
            );

            if (needPush) {
                pushStateToCloud(currentScoresCache);
            }
        }

        // =====================
        // SUMMARY
        // =====================

        const summaryBox =
            document.getElementById("groupSummary");

        if (numGroups === 2) {

            let winnerText = "抗衡中...";

            if (totalWinA > totalWinB) {
                winnerText = "A 组红方领先 🏆";
            } else if (totalWinB > totalWinA) {
                winnerText = "B 组蓝方领先 🏆";
            }

            summaryBox.innerHTML =
                `<b>A 组红方 :</b> ${totalWinA} 胜 (${totalScoreA}分)
                <span style="margin:0 8px;">|</span>
                <b>B 组蓝方 :</b> ${totalWinB} 胜 (${totalScoreB}分)
                <br>
                <div style="margin-top:6px;color:#ffcc00;">
                ${winnerText}
                </div>`;

            summaryBox.style.display = "block";

        } else {

            summaryBox.style.display = "none";
        }

        // =====================
        // RANK
        // =====================

        const sortRule = (x, y) => {

            if (y.win !== x.win) {
                return y.win - x.win;
            }

            if (y.diffScore !== x.diffScore) {
                return y.diffScore - x.diffScore;
            }

            return y.totalScore - x.totalScore;
        };

        for (let g = 1; g <= numGroups; g++) {

            const tbody =
                document.getElementById(`rankBody_G${g}`);

            if (!tbody) continue;

            const subList =
                Object.values(stats)
                    .filter(
                        p => p.group === `G${g}`
                    )
                    .sort(sortRule);

            let html = "";

            subList.forEach((p, idx) => {

                let medal = idx + 1;

                if (idx === 0) medal = "🥇";
                if (idx === 1) medal = "🥈";
                if (idx === 2) medal = "🥉";

                html += `
                    <tr>
                        <td>${medal}</td>
                        <td>${p.name}</td>
                        <td>${p.win}-${p.lose}</td>
                        <td>${p.diffScore}</td>
                        <td>${p.totalScore}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }
    }

    // =========================
    // SHARE LINK
    // =========================

    function generateShareLink() {

        liveCalculate();

        const baseUrl =
            window.location.href.split('#')[0];

        const shareUrl =
            baseUrl + "#room=" + currentRoomId;

        navigator.clipboard.writeText(shareUrl);

        alert(
            "永久观战链接已复制，可直接发送群聊"
        );
    }

    // =========================
    // CHECK HISTORY
    // =========================

    async function checkAndRestoreHistory() {

        const hash = window.location.hash;

        // =====================
        // VIEWER MODE
        // =====================

        if (hash.startsWith("#room=")) {

            const roomIdFromUrl =
                hash.replace("#room=", "");

            const isAdmin =
                localStorage.getItem(
                    "admin_room_" + roomIdFromUrl
                ) === "true";

            if (isAdmin) {

                isViewerMode = false;

                currentRoomId = roomIdFromUrl;

                loadDataFromLocalStorage();

                return;

            } else {

                isViewerMode = true;

                currentRoomId = roomIdFromUrl;

                document.body.classList.add(
                    "viewer-mode-active"
                );

                document.getElementById(
                    "viewerModeBadge"
                ).style.display = "block";

                document.getElementById(
                    "btnWipeSystem"
                ).style.display = "none";

                const shareCard =
                    document.getElementById(
                        "sharingCardContainer"
                    );

                shareCard.innerHTML =
                    `<button type="button"
                    class="btn-block">
                    👁️ 群友实时观战模式
                    </button>`;

                // 立即同步一次
                await fetchStateFromCloud();

                // 周期同步
                cloudSyncTimer =
                    setInterval(
                        fetchStateFromCloud,
                        2000
                    );

                return;
            }
        }

        // =====================
        // ADMIN RECOVERY
        // =====================

        if (
            localStorage.getItem(
                "yuyiqifei_active"
            ) === "true"
        ) {

            loadDataFromLocalStorage();

            return;
        }

        onParamChange();
    }

    window.onload = checkAndRestoreHistory;
</script>

</html>
